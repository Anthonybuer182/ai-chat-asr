<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时语音</title>
    <!-- 添加Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --ai-accent: #6366F1;
            --ai-accent-hover: #5558E3;
            --ai-accent-glow: rgba(99, 102, 241, 0.2);
            --user-bubble: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            --ai-bubble: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-subtle: rgba(0, 0, 0, 0.06);
            --border-accent: rgba(99, 102, 241, 0.3);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.03) 0%, transparent 70%);
            animation: ambientGlow 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambientGlow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .container {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            width: 95%;
            max-width: 1000px;
            padding: 24px;
            margin: 20px;
            position: relative;
            z-index: 1;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .control-panel-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-panel-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--ai-accent);
            border-radius: 2px;
            box-shadow: 0 0 12px var(--ai-accent-glow);
        }

        .control-panel-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn i {
            font-size: 16px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            padding: 0;
            min-width: auto;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .icon-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--ai-accent) 0%, #8B5CF6 100%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .icon-btn i {
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            position: relative;
            z-index: 1;
        }

        .icon-btn:hover {
            border-color: var(--border-accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm), 0 0 20px var(--ai-accent-glow);
        }

        .icon-btn:hover i {
            color: var(--text-primary);
        }

        .icon-btn:hover::before {
            opacity: 0.1;
        }

        .icon-btn:active {
            transform: translateY(0);
        }

        .icon-btn.active {
            background: linear-gradient(135deg, var(--ai-accent) 0%, #8B5CF6 100%);
            border-color: transparent;
            box-shadow: var(--shadow-sm), 0 0 24px var(--ai-accent-glow);
        }

        .icon-btn.active i {
            color: white;
        }

        .icon-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .icon-btn:disabled i {
            color: var(--text-muted);
        }

        .tts-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tts-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-tertiary);
        }

        .tts-option:hover {
            border-color: var(--border-accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .tts-option.selected {
            border-color: var(--ai-accent);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 20px var(--ai-accent-glow);
        }

        .tts-option i {
            font-size: 20px;
            color: var(--ai-accent);
        }

        .tts-option span {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--ai-accent) 0%, #8B5CF6 100%);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), 0 0 30px var(--ai-accent-glow);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #DC2626 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning) 0%, #D97706 100%);
            color: white;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), 0 0 30px rgba(245, 158, 11, 0.3);
        }

        .btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            opacity: 0.5;
            box-shadow: none;
        }

        .conversation-panel {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 16px;
            height: 400px;
            display: flex;
            gap: 16px;
            min-height: 400px;
            overflow: hidden;
            border: 1px solid var(--border-subtle);
        }

        .live2d-panel {
            flex: 0 0 220px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg-tertiary) 0%, rgba(99, 102, 241, 0.03) 100%);
            border: 1px solid var(--border-subtle);
        }

        .messages-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 360px;
            padding: 8px;
            min-height: 360px;
            gap: 12px;
        }

        .message {
            margin-bottom: 0;
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            max-width: 85%;
            word-wrap: break-word;
            position: relative;
            animation: messageSlideIn 0.3s ease-out;
            line-height: 1.5;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delete-message-btn {
            position: absolute;
            top: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 12px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-message .delete-message-btn {
            right: -36px;
        }

        .assistant-message .delete-message-btn,
        .system-message .delete-message-btn,
        .error-message .delete-message-btn {
            left: -36px;
        }

        .message:hover .delete-message-btn {
            opacity: 1;
        }

        .delete-message-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .user-message {
            background: var(--user-bubble);
            color: white;
            margin-left: auto;
            text-align: right;
            box-shadow: var(--shadow-sm), 0 0 20px var(--ai-accent-glow);
            border-bottom-right-radius: 4px;
        }

        .assistant-message {
            background: var(--ai-bubble);
            color: var(--text-primary);
            margin-right: auto;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
            border-bottom-left-radius: 4px;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--ai-accent);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: cursorBlink 1s infinite;
            box-shadow: 0 0 8px var(--ai-accent-glow);
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
        }

        .messages-container {
            -ms-overflow-style: none;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
        }

        .system-message {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
            margin: 8px auto;
            text-align: center;
            max-width: 70%;
            font-size: 13px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin: 8px auto;
            text-align: center;
            max-width: 70%;
            font-size: 13px;
        }

        .connection-status {
            text-align: center;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .connection-status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: statusPulse 2s infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connected {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .connected::before {
            background: var(--success);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }

        .disconnected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .disconnected::before {
            background: var(--danger);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: modalFadeIn 0.2s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: var(--bg-secondary);
            margin: 5% auto;
            padding: 0;
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 480px;
            box-shadow: var(--shadow-lg), 0 0 60px var(--ai-accent-glow);
            border: 1px solid var(--border-subtle);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--ai-accent) 0%, #8B5CF6 100%);
            color: white;
            padding: 20px 24px;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            opacity: 0.8;
        }

        .close:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 24px;
            color: var(--text-primary);
        }

        .upload-area {
            margin-bottom: 24px;
        }

        .upload-dropzone {
            border: 2px dashed var(--border-accent);
            border-radius: var(--radius-lg);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: rgba(99, 102, 241, 0.05);
        }

        .upload-dropzone:hover {
            border-color: var(--ai-accent);
            background-color: rgba(99, 102, 241, 0.1);
        }

        .upload-dropzone.dragover {
            border-color: var(--ai-accent);
            background-color: rgba(99, 102, 241, 0.15);
            transform: scale(1.02);
        }

        .upload-dropzone i {
            font-size: 40px;
            color: var(--ai-accent);
            margin-bottom: 12px;
        }

        .upload-dropzone p {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .upload-dropzone small {
            color: var(--text-muted);
            font-size: 13px;
        }

        .model-list-container h4 {
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .model-list {
            overflow-y: auto;
            max-height: 280px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background-color: var(--bg-tertiary);
        }

        .model-list:empty,
        .model-list:has(.no-models) {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .no-models {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            padding: 32px 20px;
        }

        .model-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-subtle);
            background-color: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .model-item:last-child {
            border-bottom: none;
        }

        .model-item:hover {
            background-color: rgba(99, 102, 241, 0.08);
        }

        .model-item.selected {
            background-color: rgba(99, 102, 241, 0.15);
            border-left: 3px solid var(--ai-accent);
            padding-left: 13px;
        }
        
        .model-item.selected .model-name {
            color: var(--ai-accent);
            font-weight: 600;
        }
        
        .model-item.selected .fa-cube {
            color: var(--ai-accent) !important;
        }

        .model-item .model-name {
            font-weight: 500;
            flex: 1;
            color: var(--text-primary);
        }

        .model-item .model-actions {
            display: flex;
            gap: 8px;
        }

        .model-item .model-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            color: var(--text-muted);
        }

        .model-item .model-action-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .delete-model-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 12px;
        }

        .delete-model-btn:hover {
            background-color: var(--danger);
            color: white;
        }

        .audio-visualizer {
            margin: 20px 0;
            text-align: center;
        }

        #visualizerCanvas {
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background: var(--bg-tertiary);
        }

        .recording-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .recording-controls .btn {
            min-width: 120px;
            padding: 12px 20px;
            font-size: 14px;
        }

        .voiceprint-files-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .voiceprint-file-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .voiceprint-file-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 15px;
        }

        .voiceprint-file-details {
            font-size: 13px;
            color: var(--text-muted);
        }

        .voiceprint-file-actions {
            display: flex;
            gap: 8px;
        }

        .voiceprint-action-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .voiceprint-play-btn {
            background: var(--success);
            color: white;
        }

        .voiceprint-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .voiceprint-delete-btn {
            background: var(--danger);
            color: white;
        }

        .voiceprint-delete-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .no-voiceprint-files {
            text-align: center;
            padding: 16px;
            color: var(--text-muted);
            font-style: italic;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--ai-accent);
            box-shadow: 0 0 0 3px var(--ai-accent-glow);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .form-text {
            display: block;
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            padding: 10px 20px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--border-accent);
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;

</head>
<body>

                </div>

    <!-- 引入必要的库 -->
    <!-- Cubism 4.0 核心库 -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <!-- Cubism 2.1 核心库 -->
    <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
    <!-- PixiJS 6.5.2 -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <!-- pixi-live2d-display 主库 -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>
    <!-- pixi-live2d-display 扩展功能 -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/extra.min.js"></script>
    <script>
        const live2d = PIXI.live2d;

        let app;
        
        // 主函数
        (async function main() {
            // 创建PixiJS应用
                app = new PIXI.Application({
                view: document.getElementById("canvas"),  // 指定canvas元素
                autoStart: true,                          // 自动开始渲染循环
                resizeTo: document.querySelector('.live2d-panel'), // 画布大小随父容器变化
                backgroundColor: 0xf1f5f9
            });
        })();
        // 全局变量
        let websocket = null;
        let isRecording = false;
        let isConnected = false;
        let isSendingAudio = false; // 防止重复发送音频
        let audioContext = null;
        let source = null;
        let processor = null;
        let audioBuffer = [];
        let bufferDuration = 0.064; // 累积64ms音频再发送（优化实时性）
        let samplesPerBuffer = 16000 * bufferDuration; // 16kHz下64ms的采样点数（1024）
        
        // 流式回复状态管理
        let currentStreamingMessage = null; // 当前正在流式更新的消息元素
        let streamingText = ''; // 流式累积的文本
        let isStreaming = false; // 是否正在流式接收中
        let currentReplyText = ''; // 当前回复的累积文本（TTS句子）
        
        // TTS音频队列管理
        let audioQueue = []; // 音频播放队列
        let isPlayingAudio = false; // 是否正在播放音频
        
        // 打字机效果相关变量
        let typingInterval = null; // 打字定时器
        let displayedText = ''; // 已经显示的文本
        let pendingText = ''; // 待显示的文本
        let currentAudioContext = null; // 当前音频上下文
        // 采样率转换（降采样）
        function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
            if (outputSampleRate === inputSampleRate) {
                return buffer;
            }
            const sampleRateRatio = inputSampleRate / outputSampleRate;
            const newLength = Math.round(buffer.length / sampleRateRatio);
            const result = new Float32Array(newLength);
            let offsetResult = 0;
            let offsetBuffer = 0;
            while (offsetResult < result.length) {
                const nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
                // 对应多个输入样本的平均值
                let accum = 0, count = 0;
                for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
                    accum += buffer[i];
                    count++;
                }
                result[offsetResult] = accum / count;
                offsetResult++;
                offsetBuffer = nextOffsetBuffer;
            }
            return result;
        }

        // float32 转 int16
        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                let s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }

        // 连接WebSocket
        function connectWebSocket() {
            if (isConnected) {
                disconnectWebSocket();
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            console.log('尝试连接WebSocket:', wsUrl);
            websocket = new WebSocket(wsUrl);

            websocket.onopen = function() {
            isConnected = true;
            updateConnectionStatus(true);
            console.log('WebSocket连接成功');
            
            // 自动开始录音
            setTimeout(() => {
                if (!isRecording) {
                    startRecording();
                }
            }, 500);
        };

            websocket.onmessage = function(event) {
                console.log('收到WebSocket消息原始内容:', event.data);
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };

            websocket.onclose = function() {
                console.log('WebSocket连接关闭');
                isConnected = false;
                updateConnectionStatus(false);
                updateButtonStates();
                console.log('WebSocket连接关闭');
            };

            websocket.onerror = function(error) {
                console.error('WebSocket错误:', error);
                alert('连接服务器失败，请检查服务器是否运行');
            };
        }

        // 断开WebSocket连接
        function disconnectWebSocket() {
            if (websocket) {
                websocket.close();
                websocket = null;
            }
            if (isRecording) {
                stopRecording();
            }
        }

        // 处理服务器消息
        function handleServerMessage(data) {            
            // 调试：检查消息容器是否存在
            const messagesContainer = document.getElementById('messagesContainer');
            if (!messagesContainer) {
                console.error('错误：找不到 messagesContainer 元素');
                return;
            }
            
            // 根据消息类型处理
            if (data.type === 'llm_stream_start') {
                console.log('处理 llm_stream_start 消息');
                
                lastParsedEmotion = null;
                lastParsedMotion = null;
                
                // 用户语音识别结果作为用户消息显示
                if (data.text) {
                    console.log('添加用户消息:', data.text);
                    addMessage(data.text, 'user');
                } else {
                    console.log('没有识别到的文本');
                }
                
                // 流式回复开始
                isStreaming = true;
                currentReplyText = '';
                pendingText = '';
                displayedText = '';
                streamingText = '';
                currentStreamingMessage = createStreamingMessage();
                // 触发Live2D动画
                triggerLive2DAnimation('think');
            } else if (data.type === 'llm_stream_end') {
                console.log('收到 llm_stream_end', {
                    audioQueueLength: audioQueue.length,
                    pendingText: pendingText,
                    displayedText: displayedText,
                    currentReplyText: currentReplyText,
                    typingInterval: !!typingInterval
                });
                // 流式回复结束
                isStreaming = false;
                
                // 如果打字机停止了但还有待显示的文本，重新启动
                if (!typingInterval && pendingText.length > 0 && currentStreamingMessage) {
                    console.log('打字机已停止但还有文本，重新启动');
                    startTypingEffect();
                }
                
                // 只有当音频队列为空且打字机完成时才清理状态
                if (audioQueue.length === 0 && pendingText.length === 0) {
                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }
                    if (currentStreamingMessage) {
                        const cursor = currentStreamingMessage.querySelector('.typing-cursor');
                        if (cursor) {
                            cursor.remove();
                        }
                        currentStreamingMessage.classList.remove('streaming');
                    }
                    currentReplyText = '';
                    displayedText = '';
                    currentStreamingMessage = null;
                }
                streamingText = '';
                // 触发Live2D动画
                triggerLive2DAnimation('neutral');
            } else if (data.type === 'assistant_reply') {
                // AI助手完整回复（非流式）
                addMessage(data.text, 'assistant', data.timestamp);
                // 触发Live2D动画
                triggerLive2DAnimation('speak');
            } else if (data.type === 'user_speech') {
                // 用户语音识别结果
                addMessage(data.text, 'user', data.timestamp);
                // 触发Live2D动画
                triggerLive2DAnimation('listen');
            } else if (data.type === 'wakeup_detected') {
                // 唤醒词检测
                addMessage('唤醒词检测成功！', 'system', data.timestamp);
                triggerLive2DAnimation('wakeup');
            } else if (data.type === 'error' || data.type === 'llm_error') {
                // 错误消息
                if (isStreaming && currentStreamingMessage) {
                    currentStreamingMessage.remove();
                    currentStreamingMessage = null;
                    isStreaming = false;
                    streamingText = '';
                }
                addMessage('错误：' + (data.message || data.text), 'error', data.timestamp);
                triggerLive2DAnimation('sad');
            } else if (data.type === 'llm_unavailable') {
                // LLM不可用
                if (isStreaming && currentStreamingMessage) {
                    currentStreamingMessage.remove();
                    currentStreamingMessage = null;
                    isStreaming = false;
                    streamingText = '';
                }
                addMessage(data.message || 'LLM服务暂不可用', 'system', data.timestamp);
                triggerLive2DAnimation('sad');
            } else if (data.type === 'tts_audio') {
                // TTS音频消息，添加到播放队列
                console.log('收到TTS音频，准备添加到队列');
                if (data.audio) {
                    addToAudioQueue({
                        audio: data.audio,
                        text: data.text || data.message || '',
                        timestamp: data.timestamp
                    });
                }
            }
        }

        // 添加音频到播放队列
        function addToAudioQueue(audioItem) {
            audioQueue.push(audioItem);
            console.log(`音频添加到队列，当前队列长度: ${audioQueue.length}`);
            
            // 如果没有正在播放，立即开始播放
            if (!isPlayingAudio && audioQueue.length > 0) {
                playNextAudio();
            }
        }

        // 播放队列中的下一个音频
        async function playNextAudio() {
            if (audioQueue.length === 0) {
                isPlayingAudio = false;
                triggerLive2DAnimation('neutral');
                return;
            }
            
            isPlayingAudio = true;
            const audioItem = audioQueue.shift();
            
            console.log('开始播放音频队列中的音频', {
                text: audioItem.text,
                currentStreamingMessage: !!currentStreamingMessage,
                pendingText: pendingText,
                displayedText: displayedText,
                typingInterval: !!typingInterval
            });
            triggerLive2DAnimation('speak');
            
            if (audioItem.text) {
                currentReplyText += audioItem.text;
                if (!currentStreamingMessage) {
                    console.log('创建新的流式消息');
                    currentStreamingMessage = createStreamingMessage();
                }
                if (currentStreamingMessage) {
                    const textSpan = currentStreamingMessage.querySelector('.streaming-text');
                    const cursor = currentStreamingMessage.querySelector('.typing-cursor');
                    if (textSpan) {
                        textSpan.textContent = displayedText;
                    }
                    if (cursor) {
                        cursor.remove();
                    }
                    
                    pendingText += audioItem.text;
                    if (!typingInterval) {
                        startTypingEffect();
                    }
                }
            }
            
            try {
                const audioBytes = base64ToArrayBuffer(audioItem.audio);
                
                if (!currentAudioContext) {
                    currentAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                const audioBuffer = await currentAudioContext.decodeAudioData(audioBytes);
                
                const source = currentAudioContext.createBufferSource();
                source.buffer = audioBuffer;
                
                startLipSync(source, currentAudioContext);
                
                source.connect(currentAudioContext.destination);
                
                source.onended = () => {
                    stopLipSync();
                    console.log('当前音频播放完成，继续播放队列');
                    playNextAudio();
                };
                
                source.start(0);
                
            } catch (error) {
                console.error('音频播放错误:', error);
                // 播放出错，继续播放下一个
                playNextAudio();
            }
        }

        // Base64转ArrayBuffer
        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // 创建流式消息元素
        function createStreamingMessage() {
            const messagesContainer = document.getElementById('messagesContainer');
            if (!messagesContainer) return null;
            
            // 重置打字机状态
            displayedText = '';
            pendingText = '';
            if (typingInterval) {
                clearInterval(typingInterval);
                typingInterval = null;
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant-message streaming';
            messageDiv.innerHTML = `
                <div class="message-content">
                    <span class="streaming-text"></span><span class="typing-cursor"></span>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return messageDiv;
        }

        // 清理文本中的格式标签
        function cleanText(text) {
            if (!text) return '';
            // 移除 <|xxx|> 格式的标签
            return text.replace(/<\|[^|]+\|>/g, '').trim();
        }

        // 更新流式消息内容
        function updateStreamingMessage(text) {
            if (!currentStreamingMessage) return;
            
            text = cleanText(text);
            
            // 找出新增的文本
            const newText = text.substring(displayedText.length);
            
            if (newText.length > 0) {
                // 添加到待显示队列
                pendingText += newText;
                
                // 如果没有正在进行的打字，开始打字
                if (!typingInterval) {
                    startTypingEffect();
                }
            }
            
            // 滚动到底部
            const messagesContainer = document.getElementById('messagesContainer');
            if (messagesContainer) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }
        
        // 打字机效果
        let lastParsedEmotion = null;
        let lastParsedMotion = null;
        
        function startTypingEffect() {
            typingInterval = setInterval(() => {
                if (pendingText.length > 0 && currentStreamingMessage) {
                    // 取出一个字符
                    const char = pendingText.charAt(0);
                    pendingText = pendingText.substring(1);
                    displayedText += char;
                    
                    const textSpan = currentStreamingMessage.querySelector('.streaming-text');
                    if (textSpan) {
                        textSpan.textContent = displayedText;
                    }
                    
                    // 解析当前已显示文本中的Live2D标签
                    const parsed = parseLive2DTags(displayedText);
                    
                    // 如果解析到新的情绪标签，同时触发表情和动作
                    if (parsed.emotion && parsed.emotion !== lastParsedEmotion) {
                        lastParsedEmotion = parsed.emotion;
                        const emotionData = getAnimationForEmotion(parsed.emotion) || emotionToAnimationMap[parsed.emotion];
                        if (emotionData) {
                            triggerLive2DExpression(emotionData.expression || emotionData.expressions);
                            triggerLive2DAnimation(parsed.emotion);
                        } else {
                            triggerLive2DAnimation(parsed.emotion);
                        }
                    }
                    
                    // 如果解析到新的动作标签，触发对应动作
                    if (parsed.motion && parsed.motion !== lastParsedMotion) {
                        lastParsedMotion = parsed.motion;
                        const motionData = getAnimationForEmotion(parsed.motion);
                        if (motionData) {
                            triggerLive2DExpression(motionData.expression || motionData.expressions);
                        }
                        triggerLive2DAnimation(parsed.motion);
                    }
                    
                    // 滚动到底部
                    const messagesContainer = document.getElementById('messagesContainer');
                    if (messagesContainer) {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }
                } else {
                    // 待显示文本为空，停止打字定时器
                    clearInterval(typingInterval);
                    typingInterval = null;
                }
            }, 30); // 每30毫秒打一个字，约每秒33个字
        }

        // 完成流式消息
        function finalizeStreamingMessage(text, timestamp = null) {
            if (!currentStreamingMessage) return;
            
            // 解析并触发Live2D标签（在清理之前）
            const parsed = parseLive2DTags(text);
            if (parsed.emotion) {
                const emotionData = getAnimationForEmotion(parsed.emotion) || emotionToAnimationMap[parsed.emotion];
                if (emotionData) {
                    triggerLive2DExpression(emotionData.expression || emotionData.expressions);

        function initAudioAnalyser(audioContext) {

        function startLipSync(audioSource, audioContext) {
            console.log('=== startLipSync ===', { hasLive2dModel: !!live2dModel });
            
            if (!live2dModel) {
                console.log('没有加载Live2D模型');
                return;
            }
            
            stopLipSync();
            
            audioAnalyser = audioContext.createAnalyser();
            audioAnalyser.fftSize = 256;
            audioAnalyser.smoothingTimeConstant = 0.5;
            
            audioSource.connect(audioAnalyser);
            audioAnalyser.connect(audioContext.destination);
            
            const bufferLength = audioAnalyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            console.log('开始口型同步循环');
            
            function updateLipSync() {
                if (!audioAnalyser) return;
                
                audioAnalyser.getByteFrequencyData(dataArray);
                
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                let avgVolume = sum / bufferLength;
                
                let mouthValue = Math.min(1.0, (avgVolume / 128.0) * 2.5);
                
                const mouthParamNames = [
                    'PARAM_MOUTH_OPEN_Y',
                    'ParamMouthOpenY',
                    'ParamMouthOpen',
                    'ParamMouth'
                ];
                
                try {
                    const coreModel = live2dModel.internalModel.coreModel;
                    if (coreModel && coreModel.setParameterValueById) {
                        for (const paramName of mouthParamNames) {
                            coreModel.setParameterValueById(paramName, mouthValue);
                        }
                    }
                } catch(e) {
                    console.log('LipSync error:', e);
                }
                
                lipSyncAnimationId = requestAnimationFrame(updateLipSync);
            }
            
            updateLipSync();
        }
        
        function stopLipSync() {
            if (lipSyncAnimationId) {
                cancelAnimationFrame(lipSyncAnimationId);
                lipSyncAnimationId = null;
            }
            if (audioAnalyser) {
                try { audioAnalyser.disconnect(); } catch(e) {}
                audioAnalyser = null;
            }
        }

            const messages = messagesContainer.querySelectorAll('.message');
            let userIndex = 0;

                    assistantIndex++;

            });

        // 发送语音测试
        async function sendVoiceTest() {
            if (!isConnected) {
                alert('请先连接WebSocket服务器');
                return;
            }
            
            if (isSendingAudio) {
                console.log('正在发送音频中，请勿重复点击');
                return;
            }
            
            try {
                console.log('开始发送语音测试文件');
                isSendingAudio = true; // 标记正在发送
                
                // 通过API获取语音文件，添加时间戳防止缓存
                const response = await fetch(`/api/voiceprint/play?filename=current_voiceprint.webm&t=${Date.now()}`);
                if (!response.ok) {
                    throw new Error(`无法读取语音文件: ${response.status} ${response.statusText}`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                console.log('语音文件读取成功，大小:', arrayBuffer.byteLength, '字节');
                
                // 检查音频数据是否有效
                if (arrayBuffer.byteLength < 100) {
                    throw new Error('音频文件太小，可能是无效数据');
                }
                
                // 创建音频上下文处理音频数据
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 解码音频数据
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                console.log('音频解码成功，采样率:', audioBuffer.sampleRate, '时长:', audioBuffer.duration, '秒');
                
                // 获取音频数据
                const channelData = audioBuffer.getChannelData(0); // 获取第一个声道
                
                // 降采样到16kHz
                const downsampledData = downsampleBuffer(channelData, audioBuffer.sampleRate, 16000);
                
                // 转换为16bit PCM
                const int16Buffer = floatTo16BitPCM(downsampledData);
                
                // 添加微小随机变化以绕过后端重复检测
                const testAudioBuffer = new Int16Array(int16Buffer.length);
                const randomOffset = Math.floor(Math.random() * 1000); // 随机偏移量
                for (let i = 0; i < int16Buffer.length; i++) {
                    // 添加微小的随机变化（-1 到 +1），不影响语音识别
                    testAudioBuffer[i] = int16Buffer[i] + Math.floor(Math.random() * 3 - 1);
                }
                
                console.log('处理后的音频数据，长度:', testAudioBuffer.length, '采样点');
                
                // 分块发送音频数据（模拟实时流）
                const chunkSize = 1024;
                let offset = 0;
                let chunksSent = 0;
                const maxChunks = Math.ceil(testAudioBuffer.length / chunkSize);
                
                const sendNextChunk = async () => {
                    if (offset >= testAudioBuffer.length) {
                        console.log(`语音文件发送完成，共发送 ${chunksSent} 个音频块`);
                        isSendingAudio = false;
                        return;
                    }
                    
                    // 防止无限递归：检查发送块数
                    if (chunksSent > maxChunks * 2) {
                        console.error('发送块数超过限制，停止发送');
                        isSendingAudio = false;
                        return;
                    }
                    
                    const end = Math.min(offset + chunkSize, testAudioBuffer.length);
                    const chunk = testAudioBuffer.subarray(offset, end);
                    
                    if (websocket && websocket.readyState === WebSocket.OPEN) {
                        websocket.send(chunk.buffer);
                        chunksSent++;
                        
                        // 减少日志输出频率
                        if (Math.random() < 0.05 || chunksSent === 1 || offset + chunkSize >= testAudioBuffer.length) {
                            console.log(`发送音频块 ${chunksSent}/${maxChunks}，偏移: ${offset}-${end}，长度: ${chunk.length} 采样点`);
                        }
                    } else {
                        console.warn('WebSocket连接已断开，停止发送');
                        isSendingAudio = false;
                        return;
                    }
                    
                    offset = end;
                    
                    // 使用 Promise + setTimeout 控制发送速率
                    await new Promise(resolve => setTimeout(resolve, 50));
                    sendNextChunk();
                };
                
                // 开始发送
                sendNextChunk();
                
            } catch (error) {
                console.error('发送语音测试失败:', error);
                isSendingAudio = false; // 发生错误，重置标志
            }
        }

                // 清空音频队列（用户打断当前语音）
                audioQueue = [];
                if (currentAudioContext) {
                    currentAudioContext.close();
                    currentAudioContext = null;
                }
                isPlayingAudio = false;
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true} });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 尝试使用AudioWorklet（现代方案）
                try {
                    await audioContext.audioWorklet.addModule('/static/audio-processor.js');
                    const workletNode = new AudioWorkletNode(audioContext, 'audio-processor');
                    
                    workletNode.port.onmessage = (event) => {
                        if (event.data.type === 'audioChunk') {
                            // 直接接收已经分块好的音频数据
                            const chunk = new Int16Array(event.data.data);
                            
                            if (websocket && websocket.readyState === WebSocket.OPEN) {
                                // websocket.send(chunk.buffer);
                                if (Math.random() < 0.01) { // 只输出1%的日志
                                    console.log('发送音频数据，长度:', chunk.length, '采样点');
                                }
                            } else {
                                console.warn('WebSocket未连接，无法发送音频数据');
                            }
                        }
                    };
                    
                    workletNode.port.postMessage({
                        type: 'init',
                        sampleRate: audioContext.sampleRate
                    });
                    
                    source = audioContext.createMediaStreamSource(stream);
                    source.connect(workletNode);
                    workletNode.connect(audioContext.destination);
                    processor = workletNode;
                    
                    console.log('使用AudioWorklet方案');
                    
                } catch (workletError) {
                    // AudioWorklet失败，回退到ScriptProcessorNode（已弃用但兼容）
                    console.warn('AudioWorklet加载失败，使用ScriptProcessorNode:', workletError);
                    
                    source = audioContext.createMediaStreamSource(stream);
                    const bufferSize = 4096;
                    processor = audioContext.createScriptProcessor(bufferSize, 1, 1);

                    processor.onaudioprocess = (e) => {
                        if (Math.random() < 0.01) { // 只输出1%的日志
                            console.log('处理音频数据');
                        }
                        let inputData = e.inputBuffer.getChannelData(0);
                        
                        // 降采样到16kHz
                        let downsampledBuffer = downsampleBuffer(inputData, audioContext.sampleRate, 16000);
                        
                        // 转换为16bit PCM并累积
                        let int16Buffer = floatTo16BitPCM(downsampledBuffer);
                        audioBuffer.push(...int16Buffer);
                        
                        // 当缓冲区达到足够长度时发送
                        while (audioBuffer.length >= samplesPerBuffer) {
                            const chunk = new Int16Array(audioBuffer.splice(0, samplesPerBuffer));
                            // websocket.send(chunk.buffer);
                            if (websocket && websocket.readyState === WebSocket.OPEN) {
                                if (Math.random() < 0.01) { // 只输出1%的日志
                                    console.log('发送音频数据，长度:', chunk.length, '采样点');
                                }
                            } else {
                                console.warn('WebSocket未连接，无法发送音频数据');
                                break;
                            }
                        }
                    };

                    source.connect(processor);
                    processor.connect(audioContext.destination);
                    
                    console.log('使用ScriptProcessorNode方案');
                }

                isRecording = true;
                updateButtonStates();

            } catch (error) {
                console.error('开始录音失败:', error);
                alert('无法访问麦克风，请检查权限设置');
            }
        }

        // 格式化文件大小

            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 开始声纹录制
        async function startVoiceprintRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    } 
                });
                
                voiceprintAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                voiceprintAnalyser = voiceprintAudioContext.createAnalyser();
                voiceprintAnalyser.fftSize = 256;
                
                const source = voiceprintAudioContext.createMediaStreamSource(stream);
                source.connect(voiceprintAnalyser);
                
                voiceprintDataArray = new Uint8Array(voiceprintAnalyser.frequencyBinCount);
                
                // 设置MediaRecorder
                voiceprintRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                voiceprintAudioChunks = [];
                
                voiceprintRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        voiceprintAudioChunks.push(event.data);
                    }
                };
                
                voiceprintRecorder.onstop = () => {
                    voiceprintAudioBlob = new Blob(voiceprintAudioChunks, { type: 'audio/webm' });
                    console.log('录音完成，音频大小:', voiceprintAudioBlob.size, 'bytes');
                };
                
                // 开始录制
                voiceprintRecorder.start(100); // 每100ms收集一次数据
                voiceprintRecordingStartTime = Date.now();
                
                // 更新UI状态
                updateVoiceprintButtons(true);
                
                // 启动计时器
                voiceprintRecordingTimer = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - voiceprintRecordingStartTime) / 1000);
                    
                    // 自动停止录制（最长10秒）
                    if (elapsed >= 10) {
                        stopVoiceprintRecording();
                    }
                }, 1000);
                
                // 启动音频可视化
                startVisualizer();
                
            } catch (error) {
                console.error('开始录制失败:', error);
                alert('无法访问麦克风，请检查权限设置');
            }
        }

        // 停止声纹录制
        function stopVoiceprintRecording() {
            if (voiceprintRecorder && voiceprintRecorder.state === 'recording') {
                voiceprintRecorder.stop();
                
                // 停止所有音轨
                if (voiceprintRecorder.stream) {
                    voiceprintRecorder.stream.getTracks().forEach(track => track.stop());
                }
                
                if (voiceprintAudioContext) {
                    voiceprintAudioContext.close();
                    voiceprintAudioContext = null;
                }
                
                if (voiceprintRecordingTimer) {
                    clearInterval(voiceprintRecordingTimer);
                    voiceprintRecordingTimer = null;
                }
                
                if (voiceprintAnimationId) {
                    cancelAnimationFrame(voiceprintAnimationId);
                    voiceprintAnimationId = null;
                }
                
                console.log('录音已停止，开始自动上传');
                
                // 自动上传声纹录音
                setTimeout(() => {
                    uploadVoiceprintRecording();
                }, 500); // 延迟500ms确保录音完全停止
            }
        }

        // 上传声纹录音
        function uploadVoiceprintRecording() {
            updateVoiceprintButtons(false);
            if (!voiceprintAudioBlob) {
                alert('请先录制声纹音频');
                return;
            }
            
            // 检查音频大小是否合适
            if (voiceprintAudioBlob.size < 1000) {
                alert('录音太短，请录制至少3-5秒的音频');
                return;
            }
            
           
            
            // 创建FormData对象
            const formData = new FormData();
            formData.append('voiceprint', voiceprintAudioBlob, 'voiceprint.webm');
            formData.append('client_id', 'current_voiceprint'); // 使用固定client_id
            
            // 发送到服务器
            fetch('/api/voiceprint/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    // 重新加载声纹文件列表
                    loadVoiceprintFiles();
                } else {
                    throw new Error(data.message || '服务器返回失败');
                }
            })
            .catch(error => {
                console.error('上传失败:', error);
                updateVoiceprintButtons(false); // 重新启用录制按钮
                alert('声纹上传失败: ' + error.message);
            });
        }

        // 音频可视化
        function startVisualizer() {
            const canvas = document.getElementById('visualizerCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            function draw() {
                if (!voiceprintAnalyser) return;
                
                voiceprintAnalyser.getByteFrequencyData(voiceprintDataArray);
                
                ctx.clearRect(0, 0, width, height);
                
                const barWidth = (width / voiceprintDataArray.length) * 2.5;
                let x = 0;
                
                for (let i = 0; i < voiceprintDataArray.length; i++) {
                    const barHeight = voiceprintDataArray[i] / 255 * height;
                    
                    const gradient = ctx.createLinearGradient(0, height - barHeight, 0, height);
                    gradient.addColorStop(0, '#6366F1');
                    gradient.addColorStop(1, '#8B5CF6');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, height - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 1;
                }
                
                voiceprintAnimationId = requestAnimationFrame(draw);
            }
            
            draw();
        }
