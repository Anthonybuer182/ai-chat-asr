<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时语音</title>
    <!-- 添加Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --ai-accent: #6366F1;
            --ai-accent-hover: #5558E3;
            --ai-accent-glow: rgba(99, 102, 241, 0.2);
            --user-bubble: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            --ai-bubble: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-subtle: rgba(0, 0, 0, 0.06);
            --border-accent: rgba(99, 102, 241, 0.3);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.03) 0%, transparent 70%);
            animation: ambientGlow 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambientGlow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .container {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            width: 95%;
            max-width: 1000px;
            padding: 24px;
            margin: 20px;
            position: relative;
            z-index: 1;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .control-panel-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-panel-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--ai-accent);
            border-radius: 2px;
            box-shadow: 0 0 12px var(--ai-accent-glow);
        }

        .control-panel-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn i {
            font-size: 16px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            padding: 0;
            min-width: auto;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .icon-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--ai-accent) 0%, #8B5CF6 100%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .icon-btn i {
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            position: relative;
            z-index: 1;
        }

        .icon-btn:hover {
            border-color: var(--border-accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm), 0 0 20px var(--ai-accent-glow);
        }

        .icon-btn:hover i {
            color: var(--text-primary);
        }

        .icon-btn:hover::before {
            opacity: 0.1;
        }

        .icon-btn:active {
            transform: translateY(0);
        }

        .icon-btn.active {
            background: linear-gradient(135deg, var(--ai-accent) 0%, #8B5CF6 100%);
            border-color: transparent;
            box-shadow: var(--shadow-sm), 0 0 24px var(--ai-accent-glow);
        }

        .icon-btn.active i {
            color: white;
        }

        .icon-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .icon-btn:disabled i {
            color: var(--text-muted);
        }

        .tts-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tts-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-tertiary);
        }

        .tts-option:hover {
            border-color: var(--border-accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .tts-option.selected {
            border-color: var(--ai-accent);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 20px var(--ai-accent-glow);
        }

        .tts-option i {
            font-size: 20px;
            color: var(--ai-accent);
        }

        .tts-option span {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--ai-accent) 0%, #8B5CF6 100%);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), 0 0 30px var(--ai-accent-glow);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #DC2626 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning) 0%, #D97706 100%);
            color: white;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), 0 0 30px rgba(245, 158, 11, 0.3);
        }

        .btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            opacity: 0.5;
            box-shadow: none;
        }

        .conversation-panel {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 16px;
            height: 400px;
            display: flex;
            gap: 16px;
            min-height: 400px;
            overflow: hidden;
            border: 1px solid var(--border-subtle);
        }

        .live2d-panel {
            flex: 0 0 220px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg-tertiary) 0%, rgba(99, 102, 241, 0.03) 100%);
            border: 1px solid var(--border-subtle);
            contain: layout;
        }

        /* 避免 canvas 行内基线空隙 */
        .live2d-panel canvas {
            display: block;
            max-width: 100%;
        }

        .messages-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 360px;
            padding: 8px;
            min-height: 360px;
            gap: 12px;
        }

        .message {
            margin-bottom: 0;
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            max-width: 85%;
            word-wrap: break-word;
            position: relative;
            animation: messageSlideIn 0.3s ease-out;
            line-height: 1.5;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delete-message-btn {
            position: absolute;
            top: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 12px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-message .delete-message-btn {
            right: -36px;
        }

        .assistant-message .delete-message-btn,
        .system-message .delete-message-btn,
        .error-message .delete-message-btn {
            left: -36px;
        }

        .message:hover .delete-message-btn {
            opacity: 1;
        }

        .delete-message-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .user-message {
            background: var(--user-bubble);
            color: white;
            margin-left: auto;
            text-align: right;
            box-shadow: var(--shadow-sm), 0 0 20px var(--ai-accent-glow);
            border-bottom-right-radius: 4px;
        }

        .assistant-message {
            background: var(--ai-bubble);
            color: var(--text-primary);
            margin-right: auto;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
            border-bottom-left-radius: 4px;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--ai-accent);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: cursorBlink 1s infinite;
            box-shadow: 0 0 8px var(--ai-accent-glow);
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
        }

        .messages-container {
            -ms-overflow-style: none;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
        }

        .system-message {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
            margin: 8px auto;
            text-align: center;
            max-width: 70%;
            font-size: 13px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin: 8px auto;
            text-align: center;
            max-width: 70%;
            font-size: 13px;
        }

        .connection-status {
            text-align: center;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .connection-status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: statusPulse 2s infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connected {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .connected::before {
            background: var(--success);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }

        .disconnected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .disconnected::before {
            background: var(--danger);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: modalFadeIn 0.2s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: var(--bg-secondary);
            margin: 5% auto;
            padding: 0;
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 480px;
            box-shadow: var(--shadow-lg), 0 0 60px var(--ai-accent-glow);
            border: 1px solid var(--border-subtle);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--ai-accent) 0%, #8B5CF6 100%);
            color: white;
            padding: 20px 24px;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            opacity: 0.8;
        }

        .close:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 24px;
            color: var(--text-primary);
        }

        .upload-area {
            margin-bottom: 24px;
        }

        .upload-dropzone {
            border: 2px dashed var(--border-accent);
            border-radius: var(--radius-lg);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: rgba(99, 102, 241, 0.05);
        }

        .upload-dropzone:hover {
            border-color: var(--ai-accent);
            background-color: rgba(99, 102, 241, 0.1);
        }

        .upload-dropzone.dragover {
            border-color: var(--ai-accent);
            background-color: rgba(99, 102, 241, 0.15);
            transform: scale(1.02);
        }

        .upload-dropzone i {
            font-size: 40px;
            color: var(--ai-accent);
            margin-bottom: 12px;
        }

        .upload-dropzone p {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .upload-dropzone small {
            color: var(--text-muted);
            font-size: 13px;
        }

        .model-list-container h4 {
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .model-list {
            overflow-y: auto;
            max-height: 280px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background-color: var(--bg-tertiary);
        }

        .model-list:empty,
        .model-list:has(.no-models) {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Live2D 模型管理：弹窗不超出视口，模型列表在剩余区域内滚动 */
        #live2dModelModal .modal-content {
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #live2dModelModal .modal-header {
            flex-shrink: 0;
        }

        #live2dModelModal .modal-body {
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #live2dModelModal .upload-area {
            flex-shrink: 0;
        }

        #live2dModelModal .model-list-container {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #live2dModelModal .model-list-container h4 {
            flex-shrink: 0;
        }

        #live2dModelModal .model-list {
            flex: 1 1 auto;
            min-height: 120px;
            max-height: none;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .no-models {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            padding: 32px 20px;
        }

        .model-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-subtle);
            background-color: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .model-item:last-child {
            border-bottom: none;
        }

        .model-item:hover {
            background-color: rgba(99, 102, 241, 0.08);
        }

        .model-item.selected {
            background-color: rgba(99, 102, 241, 0.15);
            border-left: 3px solid var(--ai-accent);
            padding-left: 13px;
        }
        
        .model-item.selected .model-name {
            color: var(--ai-accent);
            font-weight: 600;
        }
        
        .model-item.selected .fa-cube {
            color: var(--ai-accent) !important;
        }

        .model-item .model-name {
            font-weight: 500;
            flex: 1;
            color: var(--text-primary);
        }

        .model-item .model-actions {
            display: flex;
            gap: 8px;
        }

        .model-item .model-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            color: var(--text-muted);
        }

        .model-item .model-action-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .delete-model-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 12px;
        }

        .delete-model-btn:hover {
            background-color: var(--danger);
            color: white;
        }

        .audio-visualizer {
            margin: 20px 0;
            text-align: center;
        }

        #visualizerCanvas {
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background: var(--bg-tertiary);
        }

        .recording-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .recording-controls .btn {
            min-width: 120px;
            padding: 12px 20px;
            font-size: 14px;
        }

        .voiceprint-files-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .voiceprint-file-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .voiceprint-file-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 15px;
        }

        .voiceprint-file-details {
            font-size: 13px;
            color: var(--text-muted);
        }

        .voiceprint-file-actions {
            display: flex;
            gap: 8px;
        }

        .voiceprint-action-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .voiceprint-play-btn {
            background: var(--success);
            color: white;
        }

        .voiceprint-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .voiceprint-delete-btn {
            background: var(--danger);
            color: white;
        }

        .voiceprint-delete-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .no-voiceprint-files {
            text-align: center;
            padding: 16px;
            color: var(--text-muted);
            font-style: italic;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--ai-accent);
            box-shadow: 0 0 0 3px var(--ai-accent-glow);

        }

        .form-text {

            margin-top: 8px;

        .modal-actions {

        .btn-secondary {
            background: var(--bg-tertiary);

            padding: 10px 20px;
            border-radius: var(--radius-md);

            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--border-accent);
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 16px;
                border-radius: 0;
                min-height: 100vh;

            .control-panel {

        @media (max-width: 480px) {

        .icon-btn:focus-visible,
        .btn:focus-visible,
        .tts-option:focus-visible,

        }

    </style>
</head>
<body>
