    <!-- 引入必要的库 -->
    <!-- Cubism 4.0 核心库 -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <!-- Cubism 2.1 核心库 -->
    <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
    <!-- PixiJS 6.5.2 -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <!-- pixi-live2d-display：index 为共用内核；Cubism 3/4 模型必须再加载 cubism4 运行时 -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
    <!-- pixi-live2d-display 扩展功能 -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/extra.min.js"></script>
    <script>
        /** 设为 true 时在控制台输出 Live2D / WebSocket 调试信息（频繁 log 会造成掉帧） */
        const LIVE2D_DEBUG = false;
        window.PIXI = window.PIXI || PIXI;
        const live2d = PIXI.live2d;
        if (live2d.Live2DModel && typeof live2d.Live2DModel.registerTicker === 'function') {
            live2d.Live2DModel.registerTicker(PIXI.Ticker);
        }
        // 动作交叉淡化：略拉长可减少 emotion ↔ speak 切换时的突兀感
        if (live2d && live2d.config) {
            const d = live2d.config.motionFadingDuration || 500;
            live2d.config.motionFadingDuration = Math.min(680, Math.max(440, d));
            live2d.config.motionSync = true;
        }

        let app;
        
        // 主函数
        (async function main() {
            // 创建PixiJS应用
                app = new PIXI.Application({
                view: document.getElementById("canvas"),  // 指定canvas元素
                autoStart: true,                          // 自动开始渲染循环
                resizeTo: document.querySelector('.live2d-panel'), // 画布大小随父容器变化
                backgroundColor: 0xf1f5f9,
                antialias: false,
                powerPreference: 'high-performance',
                autoDensity: true,
                resolution: Math.min(2, window.devicePixelRatio || 1),
            });
        })();
        // 全局变量
        let websocket = null;
        let isRecording = false;
        let isConnected = false;
        let isSendingAudio = false; // 防止重复发送音频
        let audioContext = null;
        let source = null;
        let processor = null;
        let audioBuffer = [];
        let bufferDuration = 0.064; // 累积64ms音频再发送（优化实时性）
        let samplesPerBuffer = 16000 * bufferDuration; // 16kHz下64ms的采样点数（1024）
        
        // 流式回复状态管理
        let currentStreamingMessage = null; // 当前正在流式更新的消息元素
        let streamingText = ''; // 流式累积的文本
        let isStreaming = false; // 是否正在流式接收中
        let currentReplyText = ''; // 当前回复的累积文本（TTS句子）
        
        // TTS音频队列管理
        let audioQueue = []; // 音频播放队列
        let isPlayingAudio = false; // 是否正在播放音频
        /** 已收到 llm_stream_end；须等 TTS 播完且打字结束后再收尾气泡，避免中途 currentStreamingMessage=null 导致下一句新建气泡“盖住”上一段 */
        let llmStreamEnded = false;
        
        // 打字机效果相关变量
        let typingInterval = null; // 打字定时器
        let displayedText = ''; // 已经显示的文本
        let pendingText = ''; // 待显示的文本
        let currentAudioContext = null; // 当前音频上下文

        /** 消息列表纵向滚动合并到每帧一次，减轻打字机高频 scrollHeight 触发的同步 layout */
        let messagesScrollRaf = null;
        function scheduleMessagesScrollToBottom() {
            if (messagesScrollRaf != null) return;
            messagesScrollRaf = requestAnimationFrame(() => {
                messagesScrollRaf = null;
                const el = document.getElementById('messagesContainer');
                if (el) el.scrollTop = el.scrollHeight;
            });
        }

        // 采样率转换（降采样）
        function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
            if (outputSampleRate === inputSampleRate) {
                return buffer;
            }
            const sampleRateRatio = inputSampleRate / outputSampleRate;
            const newLength = Math.round(buffer.length / sampleRateRatio);
            const result = new Float32Array(newLength);
            let offsetResult = 0;
            let offsetBuffer = 0;
            while (offsetResult < result.length) {
                const nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
                // 对应多个输入样本的平均值
                let accum = 0, count = 0;
                for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
                    accum += buffer[i];
                    count++;
                }
                result[offsetResult] = accum / count;
                offsetResult++;
                offsetBuffer = nextOffsetBuffer;
            }
            return result;
        }

        // float32 转 int16
        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                let s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }

        function maybeFinalizeAssistantStream() {
            if (!llmStreamEnded) return false;
            if (audioQueue.length > 0 || isPlayingAudio) return false;
            if (pendingText.length > 0 || typingInterval) return false;

            if (currentStreamingMessage) {
                const cursor = currentStreamingMessage.querySelector('.typing-cursor');
                const textSpan = currentStreamingMessage.querySelector('.streaming-text');
                const hasVisibleText = !!(textSpan && textSpan.textContent && textSpan.textContent.trim().length > 0);
                if (cursor) {
                    cursor.remove();
                }
                if (!hasVisibleText) {
                    currentStreamingMessage.remove();
                } else {
                    currentStreamingMessage.classList.remove('streaming');
                }
            }
            currentReplyText = '';
            displayedText = '';
            currentStreamingMessage = null;
            llmStreamEnded = false;
            triggerPipelineEmotion('idle');
            return true;
        }

        // 连接WebSocket
        function connectWebSocket() {
            if (isConnected) {
                disconnectWebSocket();
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            if (LIVE2D_DEBUG) console.log('尝试连接WebSocket:', wsUrl);
            websocket = new WebSocket(wsUrl);

            websocket.onopen = function() {
            isConnected = true;
            updateConnectionStatus(true);
            if (LIVE2D_DEBUG) console.log('WebSocket连接成功');
            
            // 自动开始录音
            setTimeout(() => {
                if (!isRecording) {
                    startRecording();
                }
            }, 500);
        };

            websocket.onmessage = function(event) {
                if (LIVE2D_DEBUG) console.log('收到WebSocket消息原始内容:', event.data);
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };

            websocket.onclose = function() {
                if (LIVE2D_DEBUG) console.log('WebSocket连接关闭');
                isConnected = false;
                updateConnectionStatus(false);
                updateButtonStates();
            };

            websocket.onerror = function(error) {
                console.error('WebSocket错误:', error);
                alert('连接服务器失败，请检查服务器是否运行');
            };
        }

        // 断开WebSocket连接
        function disconnectWebSocket() {
            if (websocket) {
                websocket.close();
                websocket = null;
            }
            if (isRecording) {
                stopRecording();
            }
        }

        // 处理服务器消息
        function handleServerMessage(data) {            
            // 调试：检查消息容器是否存在
            const messagesContainer = document.getElementById('messagesContainer');
            if (!messagesContainer) {
                console.error('错误：找不到 messagesContainer 元素');
                return;
            }
            
            // 根据消息类型处理
            if (data.type === 'llm_stream_start') {
                if (LIVE2D_DEBUG) console.log('处理 llm_stream_start 消息');
                
                lastParsedEmotion = null;
                cancelTtsTypingExpressionSchedule(false);
                _lastAppliedTtsOverlaySig = '';

                // 用户语音识别结果作为用户消息显示
                if (data.text) {
                    if (LIVE2D_DEBUG) console.log('添加用户消息:', data.text);
                    addMessage(data.text, 'user');
                } else {
                    if (LIVE2D_DEBUG) console.log('没有识别到的文本');
                }
                
                // 流式回复开始
                isStreaming = true;
                llmStreamEnded = false;
                currentReplyText = '';
                pendingText = '';
                displayedText = '';
                streamingText = '';
                // 延迟创建流式气泡，避免在还没有文本时生成空消息
                currentStreamingMessage = null;
                // 触发Live2D动画
                triggerPipelineEmotion('llm_waiting');
            } else if (data.type === 'llm_stream_end') {
                if (LIVE2D_DEBUG) console.log('收到 llm_stream_end', {
                    audioQueueLength: audioQueue.length,
                    pendingText: pendingText,
                    displayedText: displayedText,
                    currentReplyText: currentReplyText,
                    typingInterval: !!typingInterval
                });
                // 服务端先发 llm_stream_end 再等 TTS 播完；须等音频与打字都结束后再收尾气泡
                isStreaming = false;
                llmStreamEnded = true;

                if (!typingInterval && pendingText.length > 0 && currentStreamingMessage) {
                    if (LIVE2D_DEBUG) console.log('打字机已停止但还有文本，重新启动');
                    startTypingEffect();
                }

                maybeFinalizeAssistantStream();
                streamingText = '';
            } else if (data.type === 'assistant_reply') {
                // AI助手完整回复（非流式）
                addMessage(data.text, 'assistant', data.timestamp);
                // 触发Live2D动画
                triggerPipelineEmotion('assistant_reply');
            } else if (data.type === 'user_speech') {
                // 用户语音识别结果
                addMessage(data.text, 'user', data.timestamp);
                // 触发Live2D动画
                triggerPipelineEmotion('listening');
            } else if (data.type === 'wakeup_detected') {
                triggerPipelineEmotion('wakeup');
            } else if (data.type === 'wakeup_sleep') {
                triggerPipelineEmotion('idle');
            } else if (data.type === 'voiceprint_rejected') {
                addMessage('声纹不匹配，仅授权用户可使用', 'system', data.timestamp);
                triggerPipelineEmotion('error');
            } else if (data.type === 'voiceprint_recorded') {
                addMessage('声纹录制成功', 'system', data.timestamp);
            } else if (data.type === 'voiceprint_cleared') {
                addMessage('声纹已清除', 'system', data.timestamp);
            } else if (data.type === 'voiceprint_record_failed') {
                addMessage('声纹录制失败，请重试', 'system', data.timestamp);
            } else if (data.type === 'error' || data.type === 'llm_error') {
                // 错误消息
                if (isStreaming && currentStreamingMessage) {
                    currentStreamingMessage.remove();
                    currentStreamingMessage = null;
                    isStreaming = false;
                    streamingText = '';
                    llmStreamEnded = false;
                }
                addMessage('错误：' + (data.message || data.text), 'error', data.timestamp);
                triggerPipelineEmotion('error');
            } else if (data.type === 'llm_unavailable') {
                // LLM不可用
                if (isStreaming && currentStreamingMessage) {
                    currentStreamingMessage.remove();
                    currentStreamingMessage = null;
                    isStreaming = false;
                    streamingText = '';
                    llmStreamEnded = false;
                }
                addMessage(data.message || 'LLM服务暂不可用', 'system', data.timestamp);
                triggerPipelineEmotion('error');
            } else if (data.type === 'tts_audio') {
                // TTS音频消息，添加到播放队列
                if (LIVE2D_DEBUG) console.log('收到TTS音频，准备添加到队列');
                if (data.audio) {
                    addToAudioQueue({
                        audio: data.audio,
                        text: data.text || data.message || '',
                        textWithTags: data.textWithTags,
                        timestamp: data.timestamp
                    });
                }
            }
        }

        // 添加音频到播放队列
        function addToAudioQueue(audioItem) {
            audioQueue.push(audioItem);
            if (LIVE2D_DEBUG) console.log(`音频添加到队列，当前队列长度: ${audioQueue.length}`);
            
            // 如果没有正在播放，立即开始播放
            if (!isPlayingAudio && audioQueue.length > 0) {
                playNextAudio();
            }
        }

        // 播放队列中的下一个音频
        async function playNextAudio() {
            if (audioQueue.length === 0) {
                flushPendingTtsTypingExpression(true);
                isPlayingAudio = false;
                _lastAppliedTtsOverlaySig = '';
                const finalized = maybeFinalizeAssistantStream();
                if (!finalized) {
                    triggerPipelineEmotion('idle');
                }
                return;
            }
            
            isPlayingAudio = true;
            const audioItem = audioQueue.shift();
            
            if (LIVE2D_DEBUG) console.log('开始播放音频队列中的音频', {
                text: audioItem.text,
                currentStreamingMessage: !!currentStreamingMessage,
                pendingText: pendingText,
                displayedText: displayedText,
                typingInterval: !!typingInterval
            });
            triggerPipelineEmotion('tts_playing');
            emotionScheduler.keepAlive();

            const taggedForTyping = (audioItem.textWithTags != null && String(audioItem.textWithTags).length > 0)
                ? String(audioItem.textWithTags)
                : String(audioItem.text || '');
            const bubblePlain = (audioItem.text != null && String(audioItem.text).length > 0)
                ? String(audioItem.text)
                : stripEmotionTagsForDisplay(taggedForTyping);

            if (bubblePlain.length || taggedForTyping.length) {
                currentReplyText += bubblePlain;
                if (!currentStreamingMessage) {
                    if (LIVE2D_DEBUG) console.log('创建新的流式消息');
                    currentStreamingMessage = createStreamingMessage();
                }
                if (currentStreamingMessage) {
                    const textSpan = currentStreamingMessage.querySelector('.streaming-text');
                    const cursor = currentStreamingMessage.querySelector('.typing-cursor');
                    if (textSpan) {
                        textSpan.textContent = stripEmotionTagsForDisplay(displayedText);
                    }
                    if (cursor) {
                        cursor.remove();
                    }
                    
                    pendingText += taggedForTyping;
                    if (!typingInterval) {
                        startTypingEffect();
                    }
                }
            }
            
            try {
                const audioBytes = base64ToArrayBuffer(audioItem.audio);
                
                if (!currentAudioContext) {
                    currentAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                const audioBuffer = await currentAudioContext.decodeAudioData(audioBytes);
                
                const source = currentAudioContext.createBufferSource();
                source.buffer = audioBuffer;
                
                const lipSyncHandledOutput = startLipSync(source, currentAudioContext);
                if (!lipSyncHandledOutput) {
                    source.connect(currentAudioContext.destination);
                }
                
                source.onended = () => {
                    stopLipSync();
                    if (LIVE2D_DEBUG) console.log('当前音频播放完成，继续播放队列');
                    playNextAudio();
                };
                
                source.start(0);
                
            } catch (error) {
                console.error('音频播放错误:', error);
                // 播放出错，继续播放下一个
                playNextAudio();
            }
        }

        // Base64转ArrayBuffer
        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // 创建流式消息元素
        function createStreamingMessage() {
            const messagesContainer = document.getElementById('messagesContainer');
            if (!messagesContainer) return null;
            
            // 重置打字机状态
            displayedText = '';
            pendingText = '';
            if (typingInterval) {
                clearInterval(typingInterval);
                typingInterval = null;
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant-message streaming';
            messageDiv.innerHTML = `
                <div class="message-content">
                    <span class="streaming-text"></span><span class="typing-cursor"></span>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            scheduleMessagesScrollToBottom();
            
            return messageDiv;
        }

        // 清理文本中的格式标签
        function cleanText(text) {
            if (!text) return '';
            // 移除 <|xxx|> 格式的标签
            return text.replace(/<\|[^|]+\|>/g, '').trim();
        }

        // 更新流式消息内容
        function updateStreamingMessage(text) {
            if (!currentStreamingMessage) return;
            
            text = cleanText(text);
            
            // 找出新增的文本
            const newText = text.substring(displayedText.length);
            
            if (newText.length > 0) {
                // 添加到待显示队列
                pendingText += newText;
                
                // 如果没有正在进行的打字，开始打字
                if (!typingInterval) {
                    startTypingEffect();
                }
            }
            
            // 滚动到底部
            scheduleMessagesScrollToBottom();
        }
        
        // 打字机效果
        let lastParsedEmotion = null;
        
        function startTypingEffect() {
            typingInterval = setInterval(() => {
                if (pendingText.length > 0 && currentStreamingMessage) {
                    // 取出一个字符
                    const char = pendingText.charAt(0);
                    pendingText = pendingText.substring(1);
                    displayedText += char;
                    
                    const textSpan = currentStreamingMessage.querySelector('.streaming-text');
                    if (textSpan) {
                        textSpan.textContent = stripEmotionTagsForDisplay(displayedText);
                    }
                    
                    // 解析当前已显示文本中的Live2D标签
                    const parsed = parseLive2DTags(displayedText);
                    
                    // 解析到新情绪标签时：播报中与 speak motion 争抢会卡顿，此时只切表情
                    if (parsed.emotion && parsed.emotion !== lastParsedEmotion) {
                        lastParsedEmotion = parsed.emotion;
                        triggerLive2DEmotionFromTyping(parsed.emotion);
                    }
                    
                    scheduleMessagesScrollToBottom();
                } else {
                    // 待显示文本为空，停止打字定时器
                    clearInterval(typingInterval);
                    typingInterval = null;
                    maybeFinalizeAssistantStream();
                }
            }, 30); // 每30毫秒打一个字，约每秒33个字
        }

        // 完成流式消息
        function finalizeStreamingMessage(text, timestamp = null) {
            if (!currentStreamingMessage) return;
            
            // 解析并触发 Live2D（在清理文本标签之前）；播报中避免全套 motion 与 speak 冲突
            const parsed = parseLive2DTags(text);
            if (parsed.emotion) {
                triggerLive2DEmotionFromTyping(parsed.emotion);
            }
            
            // 清理文本中的格式标签
            text = cleanTextTags(text);
            text = cleanText(text);
            
            // 停止打字定时器
            if (typingInterval) {
                clearInterval(typingInterval);
                typingInterval = null;
            }
            
            // 显示所有剩余文本
            displayedText = text;
            pendingText = '';
            
            const textSpan = currentStreamingMessage.querySelector('.streaming-text');
            const cursor = currentStreamingMessage.querySelector('.typing-cursor');
            
            if (textSpan) {
                textSpan.textContent = text;
            }
            
            // 移除光标
            if (cursor) {
                cursor.remove();
            }
            
            currentStreamingMessage.classList.remove('streaming');
            
            scheduleMessagesScrollToBottom();

            // 重置解析状态
            lastParsedEmotion = null;
        }

        // 添加消息到聊天界面
        function addMessage(text, type, timestamp = null) {
            // 清理文本中的格式标签
            text = cleanText(text);
            if (type === 'assistant') {
                text = cleanTextTags(text);
            }
            
            const messagesContainer = document.getElementById('messagesContainer');
            if (!messagesContainer) return;
            
            // 计算消息索引（只对user和assistant类型计数）
            let messageIndex = -1;
            const existingMessages = messagesContainer.querySelectorAll('.message');
            if (type === 'user' || type === 'assistant') {
                messageIndex = Array.from(existingMessages).filter(msg => {
                    return msg.classList.contains('user-message') || msg.classList.contains('assistant-message');
                }).length;
            }
            
            const messageDiv = document.createElement('div');
            const time = timestamp ? new Date(timestamp * 1000).toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit' 
            }) : new Date().toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            let messageClass = 'message';
            
            switch (type) {
                case 'user':
                    messageClass += ' user-message';
                    break;
                case 'assistant':
                    messageClass += ' assistant-message';
                    break;
                case 'system':
                    messageClass += ' system-message';
                    break;
                case 'error':
                    messageClass += ' error-message';
                    break;
            }
            
            messageDiv.className = messageClass;
            messageDiv.setAttribute('data-message-type', type);
            messageDiv.setAttribute('data-message-index', messageIndex);
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${text}
                </div>
                <button class="delete-message-btn" onclick="deleteMessage(this)" title="删除此消息">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            messagesContainer.appendChild(messageDiv);
            
            scheduleMessagesScrollToBottom();
        }

        // =============================================
        // Live2D 情绪调度系统
        // =============================================

        const MOTION_PRIORITY = { IDLE: 1, NORMAL: 2, HIGH: 3, FORCE: 4 };

        // 每种情绪对应的触发优先级
        const EMOTION_PRIORITY_MAP = {
            neutral:  MOTION_PRIORITY.IDLE,
            think:    MOTION_PRIORITY.NORMAL,
            listen:   MOTION_PRIORITY.NORMAL,
            speak:    MOTION_PRIORITY.NORMAL,
            smile:    MOTION_PRIORITY.NORMAL,
            greet:    MOTION_PRIORITY.NORMAL,
            happy:    MOTION_PRIORITY.NORMAL,
            sad:      MOTION_PRIORITY.NORMAL,
            thinking: MOTION_PRIORITY.NORMAL,
            agree:    MOTION_PRIORITY.NORMAL,
            disagree: MOTION_PRIORITY.NORMAL,
            question: MOTION_PRIORITY.NORMAL,
            blushing: MOTION_PRIORITY.NORMAL,
            disgust:  MOTION_PRIORITY.NORMAL,
            shake:    MOTION_PRIORITY.NORMAL,
            cheer:    MOTION_PRIORITY.HIGH,
            excited:  MOTION_PRIORITY.HIGH,
            surprised:MOTION_PRIORITY.HIGH,
            angry:    MOTION_PRIORITY.HIGH,
            scared:   MOTION_PRIORITY.HIGH,
            wakeup:   MOTION_PRIORITY.FORCE,
        };

        function isReservedLive2dConfigKey(k) {
            return !k || k === 'path' || (typeof k === 'string' && k.startsWith('_'));
        }

        function isLive2dEmotionEntryLike(v) {
            return v && typeof v === 'object' && !Array.isArray(v);
        }

        function canonicalLive2dEmotionKey(cfg, name) {
            if (!cfg || !name || !isLive2dEmotionEntryLike(cfg)) return null;
            if (!isReservedLive2dConfigKey(name) && isLive2dEmotionEntryLike(cfg[name]))
                return name;
            const lower = String(name).toLowerCase();
            for (const kk of Object.keys(cfg)) {
                if (isReservedLive2dConfigKey(kk)) continue;
                if (!isLive2dEmotionEntryLike(cfg[kk])) continue;
                if (kk.toLowerCase() === lower) return kk;
            }
            return null;
        }

        /** 流水线槽位名 -> model_dict._pipeline -> Canonical 情绪键 */
        function resolvePipelineEmotion(slot) {
            if (!slot || typeof slot !== 'string') return null;
            if (!currentModelConfig || typeof currentModelConfig !== 'object') return null;
            const pl = currentModelConfig._pipeline;
            let target = slot;
            if (pl && typeof pl === 'object' && typeof pl[slot] === 'string' && pl[slot].trim())
                target = pl[slot].trim();
            return canonicalLive2dEmotionKey(currentModelConfig, target);
        }

        function emotionPriorityResolved(ek) {
            if (!ek) return MOTION_PRIORITY.NORMAL;
            const cfg = currentModelConfig && currentModelConfig[ek];
            if (cfg && typeof cfg.priority === 'number') {
                const n = cfg.priority;
                if (n <= 1) return MOTION_PRIORITY.IDLE;
                if (n >= 4) return MOTION_PRIORITY.FORCE;
                if (n >= 3) return MOTION_PRIORITY.HIGH;
                return MOTION_PRIORITY.NORMAL;
            }
            const el = typeof ek === 'string' ? ek.toLowerCase() : '';
            return EMOTION_PRIORITY_MAP[el] ?? MOTION_PRIORITY.NORMAL;
        }

        function isResolvedIdleEmotion(ek) {
            const id = resolvePipelineEmotion('idle');
            return !!(ek && id && ek === id);
        }

        function isResolvedTtsPlayingEmotion(ek) {
            const r = resolvePipelineEmotion('tts_playing');
            return !!(r && ek === r);
        }

        function isResolvedLlmWaitingEmotion(ek) {
            const r = resolvePipelineEmotion('llm_waiting');
            return !!(r && ek === r);
        }

        function bypassPipelineCooldownForEmotion(ek) {
            return ['tts_playing', 'listening', 'llm_waiting'].some((slot) => {
                const r = resolvePipelineEmotion(slot);
                return !!(r && r === ek);
            });
        }

        const emotionScheduler = {
            currentPriority: MOTION_PRIORITY.IDLE,
            currentEmotion: null,
            lastTriggerTime: 0,
            /** 多段 TTS 连续 trigger(speak) 时，限制「整段重播 motion+表情」的频率，避免每句都打断 motion 造成卡顿 */
            _lastSpeakHeavyMotionAt: 0,
            speakHeavyMotionMinMs: 3200,

            cooldownMs: 920,
            idleTimer: null,
            /** 一般情绪结束后回待机（无新 dispatch、仅靠定时器时） */
            idleDelayMs: 3200,
            /** 思考态：等 LLM 时略长，避免频繁闪回 idle */
            thinkIdleDelayMs: 10000,

            canTrigger(emotion) {
                const priority = emotionPriorityResolved(emotion);
                const now = Date.now();
                if (priority === MOTION_PRIORITY.FORCE) return true;
                // 显式回到待机：必须允许覆盖 tts/listen，否则会一直被挡住
                if (isResolvedIdleEmotion(emotion)) return true;
                if (priority < this.currentPriority) return false;
                // 对话流水线高频重复的同槽位映射情绪，不可用同情绪冷却挡掉
                const bypassSameEmotionCooldown = bypassPipelineCooldownForEmotion(emotion);
                if (!bypassSameEmotionCooldown
                    && emotion === this.currentEmotion
                    && (now - this.lastTriggerTime) < this.cooldownMs) {
                    return false;
                }
                return true;
            },

            dispatch(emotion) {
                if (!emotion) return;
                if (!this.canTrigger(emotion)) return;

                const priority = emotionPriorityResolved(emotion);
                this.currentEmotion = emotion;
                this.currentPriority = priority;
                this.lastTriggerTime = Date.now();

                if (isResolvedIdleEmotion(emotion) && this.idleTimer) {
                    clearTimeout(this.idleTimer);
                    this.idleTimer = null;
                }
                if (isResolvedIdleEmotion(emotion)) {
                    this._lastSpeakHeavyMotionAt = 0;
                }

                if (isResolvedTtsPlayingEmotion(emotion) && this._lastSpeakHeavyMotionAt
                    && (Date.now() - this._lastSpeakHeavyMotionAt) < this.speakHeavyMotionMinMs) {
                    // 已在说话 motion 窗口内：延长待机计时即可，避免重复 clearTimeout 抖动
                    if (typeof isPlayingAudio !== 'undefined' && isPlayingAudio) {
                        this.keepAlive();
                    } else {
                        this._scheduleReturnToIdle();
                    }
                    return;
                }
                if (isResolvedTtsPlayingEmotion(emotion)) {
                    this._lastSpeakHeavyMotionAt = Date.now();
                }

                const config = getAnimationForEmotion(emotion);
                if (config) {
                    if (config.expression?.length) applyExpression(config.expression);
                    if (config.motion?.length || runtimeMotionGroupNames.length) {
                        playMotion(config.motion || [], emotion);
                    }
                } else {
                    playFallbackMotion(emotion);
                }

                if (!isResolvedIdleEmotion(emotion)) this._scheduleReturnToIdle();
            },

            /** TTS 播放中反复调用，用于延长「不回待机」时间，避免长语音/多段音频中途被切回 idle */
            keepAlive() {
                if (isResolvedIdleEmotion(this.currentEmotion)) return;
                this._scheduleReturnToIdle();
            },

            _scheduleReturnToIdle() {
                if (this.idleTimer) clearTimeout(this.idleTimer);
                const delay =
                    isResolvedLlmWaitingEmotion(this.currentEmotion)
                        ? this.thinkIdleDelayMs
                        : this.idleDelayMs;
                this.idleTimer = setTimeout(() => {
                    if (this.currentPriority <= MOTION_PRIORITY.NORMAL) this.returnToIdle();
                }, delay);
            },

            returnToIdle() {
                if (typeof isPlayingAudio !== 'undefined' && isPlayingAudio) {
                    this.keepAlive();
                    return;
                }
                const idleKey = resolvePipelineEmotion('idle');
                if (!idleKey) {
                    this.currentPriority = MOTION_PRIORITY.IDLE;
                    this.lastTriggerTime = 0;
                    return;
                }
                this.currentEmotion = idleKey;
                this.currentPriority = emotionPriorityResolved(idleKey);
                this.lastTriggerTime = 0;
                const config = getAnimationForEmotion(idleKey);
                if (config?.expression?.length) applyExpression(config.expression);
                if (config?.motion?.length || runtimeMotionGroupNames.length) {
                    playMotion(config?.motion || [], idleKey);
                }
            },

            forceIdle() {
                if (this.idleTimer) clearTimeout(this.idleTimer);
                this.returnToIdle();
            },
        };

        // motion：按标签轮询尝试，避免每次随机打乱带来的「跳戏」感
        const _motionRoundIndex = Object.create(null);
        /** 从当前模型的 model3.json 解析出的 Motions 分组键（与 model_dict 里可能不一致） */
        let runtimeMotionGroupNames = [];

        async function fetchMotionGroupsFromModel3Url(modelUrl) {
            runtimeMotionGroupNames = [];
            try {
                const res = await fetch(modelUrl, { cache: 'no-store' });
                if (!res.ok) {
                    console.warn('[Live2D] 无法读取 model3.json:', res.status, modelUrl);
                    return;
                }
                const j = await res.json();
                let motions = j.FileReferences && j.FileReferences.Motions;
                if (!motions && j.Motions) {
                    motions = j.Motions;
                }
                if (motions && typeof motions === 'object' && !Array.isArray(motions)) {
                    runtimeMotionGroupNames = Object.keys(motions);
                    if (LIVE2D_DEBUG) console.log('[Live2D] model3.json 动作分组:', runtimeMotionGroupNames.join(', '));
                } else {
                    console.warn('[Live2D] model3.json 中未找到 Motions 对象（FileReferences.Motions）');
                }
            } catch (e) {
                console.warn('[Live2D] 拉取/解析 model3.json 失败', e);
            }
        }

        function harvestMotionGroupsFromInternalModel() {
            if (runtimeMotionGroupNames.length) return;
            try {
                const settings = live2dModel && live2dModel.internalModel && live2dModel.internalModel.settings;
                if (settings && typeof settings.motionGroups === 'object' && settings.motionGroups) {
                    const keys = Object.keys(settings.motionGroups);
                    if (keys.length) {
                        runtimeMotionGroupNames = keys;
                        if (LIVE2D_DEBUG) console.log('[Live2D] 从 internalModel.settings 读取动作分组:', keys.join(', '));
                    }
                }
            } catch (e) { /* 忽略 */ }
        }

        function resolveMotionGroupName(requested) {
            if (!requested) return requested;
            if (!runtimeMotionGroupNames.length) return requested;
            if (runtimeMotionGroupNames.includes(requested)) return requested;
            const n = String(requested);
            const stripped = n.replace(/_\d+$/, '');
            if (runtimeMotionGroupNames.includes(stripped)) return stripped;
            const nl = n.toLowerCase();
            let hit = runtimeMotionGroupNames.find((k) => k.toLowerCase() === nl);
            if (hit) return hit;
            hit = runtimeMotionGroupNames.find((k) => {
                const kl = k.toLowerCase();
                return nl.startsWith(kl) || kl.startsWith(stripped.toLowerCase());
            });
            return hit || requested;
        }

        function orderRuntimeGroupsForEmotion(label) {
            const keys = runtimeMotionGroupNames;
            if (!keys.length) return [];
            const l = String(label || '').toLowerCase();
            const score = (name) => {
                if (name === '') return 0;
                const n = name.toLowerCase();
                if (l.includes('speak')) {
                    if (/speak|voice|talk|flick|tap|shake/.test(n)) return 0;
                    if (/idle/.test(n)) return 4;
                }
                if (l.includes('think')) {
                    if (/tap|flick|think/.test(n)) return 0;
                    if (/idle/.test(n)) return 5;
                }
                if (l.includes('listen')) {
                    if (/idle|tap|listen/.test(n)) return 1;
                }
                if (/idle/.test(n)) return 2;
                return 3;
            };
            return [...keys].sort((a, b) => score(a) - score(b) || a.localeCompare(b));
        }

        function buildExtendedMotionList(dictList, label) {
            const base = Array.isArray(dictList)
                ? dictList.filter((x) => x !== undefined && x !== null)
                : [];
            const out = [];
            const seen = new Set();
            for (const x of base) {
                if (!seen.has(x)) {
                    out.push(x);
                    seen.add(x);
                }
            }
            for (const x of orderRuntimeGroupsForEmotion(label)) {
                if (!seen.has(x)) {
                    out.push(x);
                    seen.add(x);
                }
            }
            return out;
        }

        function tryStartMotionGroup(name) {
            if (!live2dModel) return false;
            if (name === undefined || name === null) return false;

            const mm = live2dModel.internalModel && live2dModel.internalModel.motionManager;

            /* Cubism 导出里常见「唯一分组名为空字符串」*（Kei、部分 Haru）— 必须带索引播放 */
            if (name === '') {
                if (mm && typeof mm.startRandomMotion === 'function') {
                    try {
                        mm.startRandomMotion('');
                        return true;
                    } catch (e) { /* 继续 */ }
                }
                for (let idx = 0; idx < 32; idx++) {
                    const attempts = [
                        () => live2dModel.motion('', idx),
                        () => live2dModel.motion('', idx, 3),
                    ];
                    if (mm && typeof mm.startMotion === 'function') {
                        attempts.push(() => mm.startMotion('', idx, 3));
                        attempts.push(() => mm.startMotion('', idx));
                    }
                    for (let i = 0; i < attempts.length; i++) {
                        try {
                            attempts[i]();
                            return true;
                        } catch (e) { /* 试下一种 */ }
                    }
                }
                return false;
            }

            const names = [...new Set([resolveMotionGroupName(name), name].filter((n) => n !== undefined && n !== null))];
            for (const groupName of names) {
                const attempts = [
                    () => live2dModel.motion(groupName),
                    () => live2dModel.motion(groupName, 0),
                ];
                if (mm && typeof mm.startRandomMotion === 'function') {
                    attempts.push(() => mm.startRandomMotion(groupName));
                }
                for (let i = 0; i < attempts.length; i++) {
                    try {
                        attempts[i]();
                        return true;
                    } catch (e) { /* 试下一种 */ }
                }
            }
            return false;
        }

        function playMotion(motionList, label) {
            if (!live2dModel) return;
            const extended = buildExtendedMotionList(motionList, label);
            if (!extended.length) {
                console.warn('[Live2D] playMotion 无候选分组（model_dict 无 motion 且未能解析 model3 Motions）:', label);
                return;
            }
            const key = String(label || '_');
            let start = _motionRoundIndex[key] || 0;
            let lastErr = null;
            for (let k = 0; k < extended.length; k++) {
                const motion = extended[(start + k) % extended.length];
                try {
                    if (tryStartMotionGroup(motion)) {
                        _motionRoundIndex[key] = (start + 1) % extended.length;
                        if (LIVE2D_DEBUG) console.log(`[Motion] ${label || ''}: ${motion}`);
                        return;
                    }
                    lastErr = new Error('tryStartMotionGroup returned false');
                } catch (e) {
                    lastErr = e;
                }
            }
            console.warn('[Live2D] motion 均未播放成功。请在浏览器控制台查看 [Live2D] model3.json 动作分组，并把 model_dict 里 motion 改成与之一致的分组名。', label, motionList, lastErr);
        }

        // 内部状态（speak/listen/think/wakeup）的 fallback motion
        function playFallbackMotion(state) {
            if (!live2dModel) return;
            const fallbacks = {
                speak:  ['Idle', 'Tap', 'Talk', 'Speak', 'TapBody', 'default'],
                listen: ['Idle', 'Tap', 'Listen', 'default'],
                think:  ['Tap', 'FlickDown', 'Think', 'Idle', 'default'],
                wakeup: ['Tap', 'Idle', 'default'],
            };
            const list = buildExtendedMotionList(fallbacks[state] || ['Idle'], state);
            for (const m of list) {
                if (tryStartMotionGroup(m)) return;
            }
            console.warn('[Live2D] fallback motion 均未成功:', state);
        }

        /** TTS 播报中：防抖合并短时间内的 [EMOTION:]，并用固定首项表情，避免与 speak 状态共用轮询键导致乱切脸 */
        let _ttsEmotionExprDebounceTimer = null;
        let _ttsPendingOverlayEmotion = null;
        let _lastAppliedTtsOverlaySig = '';

        function cancelTtsTypingExpressionSchedule(clearPending) {
            if (_ttsEmotionExprDebounceTimer) {
                clearTimeout(_ttsEmotionExprDebounceTimer);
                _ttsEmotionExprDebounceTimer = null;
            }
            if (clearPending) _ttsPendingOverlayEmotion = null;
        }

        function applyTtsOverlayExpression(emotion) {
            if (!emotion || !live2dModel) return;
            const config = getAnimationForEmotion(emotion);
            const list = config?.expression;
            if (!list?.length) return;
            const expr = list[0];
            const sig = `${emotion}|${expr}`;
            if (sig === _lastAppliedTtsOverlaySig) return;
            _lastAppliedTtsOverlaySig = sig;
            try {
                if (typeof live2dModel.expression === 'function') {
                    live2dModel.expression(expr);
                    if (LIVE2D_DEBUG) console.log(`[Expression/TTS overlay] ${emotion} → ${expr}`);
                }
            } catch (e) {
                console.warn(`[Expression/TTS overlay] ${expr}`, e);
            }
        }

        function flushPendingTtsTypingExpression(runPending) {
            cancelTtsTypingExpressionSchedule(false);
            const em = _ttsPendingOverlayEmotion;
            _ttsPendingOverlayEmotion = null;
            if (runPending && em) applyTtsOverlayExpression(em);
        }

        function scheduleTtsTypingExpression(emotion) {
            cancelTtsTypingExpressionSchedule(false);
            _ttsPendingOverlayEmotion = emotion;
            _ttsEmotionExprDebounceTimer = setTimeout(() => {
                _ttsEmotionExprDebounceTimer = null;
                const em = _ttsPendingOverlayEmotion;
                _ttsPendingOverlayEmotion = null;
                if (em) applyTtsOverlayExpression(em);
            }, 160);
        }

        // expression：同情绪下轮询取用，比纯随机更稳定、少「抽风换脸」
        const _expressionRoundIndex = Object.create(null);
        function applyExpression(expressionList) {
            if (!live2dModel || !expressionList?.length) return;
            const key = emotionScheduler.currentEmotion || '_';
            const i0 = _expressionRoundIndex[key] || 0;
            const expr = expressionList[i0 % expressionList.length];
            _expressionRoundIndex[key] = (i0 + 1) % expressionList.length;
            try {
                if (typeof live2dModel.expression === 'function') {
                    live2dModel.expression(expr);
                    if (LIVE2D_DEBUG) console.log(`[Expression] ${expr}`);
                }
            } catch (e) { console.warn(`[Expression] ${expr} 不可用`); }
        }

        // ——— 兼容旧调用入口（其他地方直接调用这两个函数的不需要改）———
        /**
         * 打字流暴露出的 [EMOTION:]：在 TTS 播报中与 emotionScheduler.dispatch('speak') 共用时间段，
         * 若此处再 dispatch 全套 motion，会与 speak 动作反复抢夺 motionManager，Epsilon 等模型易卡顿。
         * 播报中：防抖 + 仅用该情绪 expression 列表首项（不用 speak 轮询键），静默时再完整 dispatch。
         */
        function triggerLive2DEmotionFromTyping(emotion) {
            if (!emotion) return;
            if (typeof isPlayingAudio !== 'undefined' && isPlayingAudio) {
                scheduleTtsTypingExpression(emotion);
                return;
            }
            cancelTtsTypingExpressionSchedule(true);
            _lastAppliedTtsOverlaySig = '';
            triggerLive2DAnimation(emotion);
        }

        function triggerLive2DAnimation(animationType) {
            emotionScheduler.dispatch(animationType);
        }

        /** UI 流水线槽位（非 LLM 情绪名）；实际情绪由 model_dict._pipeline[slot] → 配置的键解析 */
        function triggerPipelineEmotion(pipelineSlot) {
            const ek = resolvePipelineEmotion(pipelineSlot);
            if (!ek) {
                if (LIVE2D_DEBUG) console.warn('[Live2D] 流水线槽位未映射到情绪:', pipelineSlot);
                return;
            }
            triggerLive2DAnimation(ek);
        }

        function triggerLive2DExpression(expressionNames) {
            applyExpression(Array.isArray(expressionNames) ? expressionNames : [expressionNames]);
        }

        let audioAnalyser = null;
        let lipSyncSmoothedOpen = 0;
        /** 音频结束后的嘴型闭合淡出 */
        let lipSyncClosing = false;
        let _lastLipKeepAliveAt = 0;
        /** null = 尚未扫描；[] = 已扫描但需回退到按名设置 */
        let mouthParameterIndexCache = null;
        /** 略低于默认更新，确保在 motion/物理之后写嘴型，否则会被每帧覆盖「看起来不动」 */
        const LIP_SYNC_TICKER_PRIORITY = -50;

        function resetMouthParameterCache() {
            mouthParameterIndexCache = null;
        }

        /** Cubism Web 可能把 MOC 包在 coreModel 或 coreModel._model 上 */
        function getCubismParamAccessor(coreModel) {
            if (!coreModel) return null;
            if (typeof coreModel.getParameterCount === 'function') return coreModel;
            const inner = coreModel._model;
            if (inner && typeof inner.getParameterCount === 'function') return inner;
            return null;
        }

        /** 解析嘴张开参数的下标（Cubism 4），避免 setParameterValueById 与字符串名不匹配 */
        function collectMouthOpenParameterIndices(coreModel) {
            const m = getCubismParamAccessor(coreModel);
            if (!m) return [];
            const found = [];
            try {
                const n = m.getParameterCount();
                if (typeof n !== 'number') return found;
                for (let i = 0; i < n; i++) {
                    const pid = m.getParameterId(i);
                    let s = '';
                    if (typeof pid === 'string') s = pid;
                    else if (pid && typeof pid.getString === 'function') s = pid.getString();
                    else if (pid && pid.string) s = pid.string;
                    else s = String(pid);
                    if (/MOUTH_OPEN|MouthOpen|ParamMouthOpen|param_mouth_open|MouthForm|PARAM_MOUTH_FORM|ParamMouthForm/i.test(s)) {
                        found.push(i);
                    }
                }
            } catch (e) { /* 忽略 */ }
            return found;
        }

        function applyMouthOpenToModel(coreModel, value) {
            const m = getCubismParamAccessor(coreModel);
            if (!m) return;
            const v = Math.max(0, Math.min(1, value));
            if (mouthParameterIndexCache === null) {
                mouthParameterIndexCache = collectMouthOpenParameterIndices(coreModel);
            }
            try {
                const idxs = mouthParameterIndexCache;
                if (idxs && idxs.length && m.setParameterValueByIndex) {
                    for (const idx of idxs) {
                        m.setParameterValueByIndex(idx, v);
                    }
                    return;
                }
                const mouthParamNames = [
                    'PARAM_MOUTH_OPEN_Y',
                    'ParamMouthOpenY',
                    'ParamMouthOpen',
                    'ParamMouth'
                ];
                if (m.setParameterValueById) {
                    for (const paramName of mouthParamNames) {
                        try {
                            m.setParameterValueById(paramName, v);
                        } catch (_) { /* 尝试下一个 */ }
                    }
                }
            } catch (e) {
                console.warn('LipSync apply:', e);
            }
        }

        let lipSyncTickerFn = null;
        let lipSyncFreqBuf = null;
        let lipSyncTimeBuf = null;
        let lipSyncFreqBinCount = 0;
        let lipSyncTickCounter = 0;

        function lipSyncPixiTick() {
            const coreModel = live2dModel && live2dModel.internalModel && live2dModel.internalModel.coreModel;

            if (lipSyncClosing) {
                lipSyncSmoothedOpen *= 0.88;
                applyMouthOpenToModel(coreModel, lipSyncSmoothedOpen);
                if (lipSyncSmoothedOpen < 0.028) {
                    hardStopLipSyncInfrastructure();
                }
                return;
            }

            if (!audioAnalyser || !lipSyncFreqBuf) return;

            audioAnalyser.getByteFrequencyData(lipSyncFreqBuf);
            audioAnalyser.getByteTimeDomainData(lipSyncTimeBuf);

            lipSyncTickCounter++;

            const bufferLength = lipSyncFreqBinCount;
            let vocalSum = 0;
            const bandMax = Math.min(72, bufferLength);
            for (let i = 3; i < bandMax; i++) {
                vocalSum += lipSyncFreqBuf[i];
            }
            const vocalAvg = vocalSum / Math.max(1, bandMax - 3) / 255;

            let timeSumSq = 0;
            for (let i = 0; i < lipSyncTimeBuf.length; i++) {
                const z = (lipSyncTimeBuf[i] - 128) / 128;
                timeSumSq += z * z;
            }
            const rms = Math.sqrt(timeSumSq / lipSyncTimeBuf.length);

            let target = Math.min(1, vocalAvg * 1.78 + rms * 2.25);
            if (target < 0.04) target *= 0.45;

            const prevOpen = lipSyncSmoothedOpen;
            const alphaUp = 0.5;
            const alphaDn = 0.26;
            if (target > lipSyncSmoothedOpen) {
                lipSyncSmoothedOpen += (target - lipSyncSmoothedOpen) * alphaUp;
            } else {
                lipSyncSmoothedOpen += (target - lipSyncSmoothedOpen) * alphaDn;
            }
            const maxDelta = 0.2;
            lipSyncSmoothedOpen = prevOpen + Math.max(-maxDelta, Math.min(maxDelta, lipSyncSmoothedOpen - prevOpen));

            applyMouthOpenToModel(coreModel, lipSyncSmoothedOpen);

            const now = performance.now();
            if (now - _lastLipKeepAliveAt > 1800) {
                _lastLipKeepAliveAt = now;
                emotionScheduler.keepAlive();
            }
        }

        function hardStopLipSyncInfrastructure() {
            lipSyncClosing = false;
            if (lipSyncTickerFn && typeof app !== 'undefined' && app && app.ticker) {
                try {
                    app.ticker.remove(lipSyncTickerFn);
                } catch (e) { /* noop */ }
            }
            lipSyncTickerFn = null;
            lipSyncFreqBuf = null;
            lipSyncTimeBuf = null;
            lipSyncFreqBinCount = 0;
            lipSyncTickCounter = 0;
            if (audioAnalyser) {
                try { audioAnalyser.disconnect(); } catch (e) {}
                audioAnalyser = null;
            }
            lipSyncSmoothedOpen = 0;
            try {
                const cm = live2dModel && live2dModel.internalModel && live2dModel.internalModel.coreModel;
                applyMouthOpenToModel(cm, 0);
            } catch (_) { /* noop */ }
        }

        function parseLive2DTags(text) {
            const emotionTagMatch = text.match(/\[EMOTION:(\w+)\]/i);
            
            let emotion = null;
            
            if (emotionTagMatch) {
                emotion = emotionTagMatch[1].toLowerCase();
                if (LIVE2D_DEBUG) console.log(`[DEBUG] parseLive2DTags: 解析到情绪标签: ${emotion}`);
            }
            
            return { emotion };
        }
        
        function cleanTextTags(text) {
            return text.replace(/\[EMOTION:\w+\]/gi, '').trim();
        }
        
        // 仅用于展示：移除完整和未闭合的 EMOTION 标签，避免流式打字时暴露控制指令
        // 打字机逐字输入时会出现 "["、"[EM" 等前缀，需一并隐藏，否则标签会「闪一下」
        function stripEmotionTagsForDisplay(text) {
            if (!text) return '';
            let s = text
                .replace(/\[EMOTION:\w+\]/gi, '')
                .replace(/\[EMOTION:[^\]]*$/gi, '');
            const lastBracket = s.lastIndexOf('[');
            if (lastBracket !== -1) {
                const tail = s.slice(lastBracket).toLowerCase();
                const marker = '[emotion:';
                if (marker.startsWith(tail)) {
                    s = s.slice(0, lastBracket);
                }
            }
            return s;
        }
        
        
        function initAudioAnalyser(audioContext) {
            if (!audioContext) {
                return null;
            }
            
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.8;
            return analyser;
        }
        
        /** @returns {boolean} 若已接通「source → analyser → destination」，则不要再对 source.connect(destination)，否则会重复出声 */
        function startLipSync(audioSource, audioContext) {
            if (LIVE2D_DEBUG) console.log('=== startLipSync ===', { hasLive2dModel: !!live2dModel, hasAppTicker: !!(app && app.ticker) });

            if (!live2dModel) {
                if (LIVE2D_DEBUG) console.log('没有加载Live2D模型');
                return false;
            }

            hardStopLipSyncInfrastructure();

            lipSyncClosing = false;
            lipSyncSmoothedOpen = 0;
            _lastLipKeepAliveAt = 0;
            lipSyncTickCounter = 0;

            audioAnalyser = audioContext.createAnalyser();
            audioAnalyser.fftSize = 256;
            audioAnalyser.smoothingTimeConstant = 0.78;

            audioSource.connect(audioAnalyser);
            audioAnalyser.connect(audioContext.destination);

            lipSyncFreqBinCount = audioAnalyser.frequencyBinCount;
            lipSyncFreqBuf = new Uint8Array(lipSyncFreqBinCount);
            lipSyncTimeBuf = new Uint8Array(audioAnalyser.fftSize);

            lipSyncTickerFn = lipSyncPixiTick;
            if (app && app.ticker) {
                app.ticker.add(lipSyncTickerFn, null, LIP_SYNC_TICKER_PRIORITY);
            } else {
                console.warn('[Live2D] 口型：PIXI Application 的 ticker 未就绪，无法驱动嘴型（请刷新后重试）');
                hardStopLipSyncInfrastructure();
                return false;
            }

            if (LIVE2D_DEBUG) console.log('口型同步已挂到 Pixi Ticker (优先级 ' + LIP_SYNC_TICKER_PRIORITY + ')');
            return true;
        }

        /** 播放结束：断开 analyser，由 lipSyncPixiTick 的闭合阶段收嘴 */
        function stopLipSync() {
            if (!lipSyncTickerFn && !audioAnalyser) return;
            lipSyncClosing = true;
            if (audioAnalyser) {
                try { audioAnalyser.disconnect(); } catch (e) {}
                audioAnalyser = null;
            }
        }

        // 发送语音测试
        async function sendVoiceTest() {
            if (!isConnected) {
                alert('请先连接WebSocket服务器');
                return;
            }
            if (isSendingAudio) {
                console.log('正在发送音频中，请勿重复点击');
                return;
            }

            try {
                isSendingAudio = true;
                console.log('开始发送语音测试文件');

                const response = await fetch(`/api/voiceprint/play?filename=current_voiceprint.webm`);
                if (!response.ok) {
                    throw new Error(`无法读取语音文件: ${response.status} ${response.statusText}`);
                }

                const arrayBuffer = await response.arrayBuffer();
                if (arrayBuffer.byteLength < 100) {
                    throw new Error('音频文件太小，可能是无效数据');
                }
                console.log('语音文件读取成功，大小:', arrayBuffer.byteLength, '字节');

                const testAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await testAudioCtx.decodeAudioData(arrayBuffer);
                console.log('音频解码成功，采样率:', audioBuffer.sampleRate, '时长:', audioBuffer.duration.toFixed(2), '秒');

                // 归一化 + 降采样到 16kHz + 转 PCM（与 AudioWorklet 路径一致）
                const channelData = audioBuffer.getChannelData(0);
                const normalized = normalizeFloat32(channelData);
                const downsampled = downsampleBuffer(normalized, audioBuffer.sampleRate, 16000);
                const int16Buffer = floatTo16BitPCM(downsampled);
                await testAudioCtx.close();

                console.log('处理后音频长度:', int16Buffer.length, '采样点');

                // 按块发送，模拟实时流
                const chunkSize = 1600; // 100ms @ 16kHz
                let chunksSent = 0;
                for (let offset = 0; offset < int16Buffer.length; offset += chunkSize) {
                    if (!websocket || websocket.readyState !== WebSocket.OPEN) {
                        console.warn('WebSocket连接已断开，停止发送');
                        break;
                    }
                    const chunk = int16Buffer.slice(offset, offset + chunkSize);
                    websocket.send(chunk.buffer);
                    chunksSent++;
                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                console.log(`语音测试发送完成，共 ${chunksSent} 块`);

                // 发送静音块触发后端段结束（需超过服务端 speech_end_silence_sec，默认约 0.55s）
                if (websocket && websocket.readyState === WebSocket.OPEN) {
                    const silenceChunk = new Int16Array(1600); // 全零 = 静音
                    const silencesToSend = 10; // 10 × 100ms = 1s 静音
                    for (let i = 0; i < silencesToSend; i++) {
                        websocket.send(silenceChunk.buffer);
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                }
            } catch (error) {
                console.error('发送语音测试失败:', error);
            } finally {
                isSendingAudio = false;
            }
        }

        // 归一化 Float32 音频（最大振幅拉到 1.0）
        function normalizeFloat32(buffer) {
            let maxVal = 0;
            for (let i = 0; i < buffer.length; i++) {
                const abs = Math.abs(buffer[i]);
                if (abs > maxVal) maxVal = abs;
            }
            if (maxVal === 0) return buffer;
            const result = new Float32Array(buffer.length);
            for (let i = 0; i < buffer.length; i++) {
                result[i] = buffer[i] / maxVal;
            }
            return result;
        }
        // 开始录音
        async function startRecording() {
            try {
                console.log('开始录音');
                
                // 清空音频队列（用户打断当前语音）
                audioQueue = [];
                if (currentAudioContext) {
                    currentAudioContext.close();
                    currentAudioContext = null;
                }
                isPlayingAudio = false;
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true} });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 尝试使用AudioWorklet（现代方案）
                try {
                    await audioContext.audioWorklet.addModule('/static/audio-processor.js?v=20250517d');
                    const workletNode = new AudioWorkletNode(audioContext, 'audio-processor');
                    
                    workletNode.port.onmessage = (event) => {
                        if (event.data.type === 'audioChunk') {
                            const chunk = new Int16Array(event.data.data);
                            if (websocket && websocket.readyState === WebSocket.OPEN) {
                                websocket.send(chunk.buffer);
                                if (LIVE2D_DEBUG) console.log('发送音频数据', chunk.length);
                            } else {
                                console.warn('WebSocket未连接，无法发送音频数据');
                            }
                        }
                    };
                    
                    workletNode.port.postMessage({
                        type: 'init',
                        sampleRate: audioContext.sampleRate
                    });
                    
                    source = audioContext.createMediaStreamSource(stream);
                    source.connect(workletNode);
                    workletNode.connect(audioContext.destination);
                    processor = workletNode;
                    
                    console.log('使用AudioWorklet方案');
                    
                } catch (workletError) {
                    // AudioWorklet失败，回退到ScriptProcessorNode（已弃用但兼容）
                    console.warn('AudioWorklet加载失败，使用ScriptProcessorNode:', workletError);
                    
                    source = audioContext.createMediaStreamSource(stream);
                    const bufferSize = 4096;
                    processor = audioContext.createScriptProcessor(bufferSize, 1, 1);

                    processor.onaudioprocess = (e) => {
                        if (LIVE2D_DEBUG && Math.random() < 0.02) {
                            console.log('处理音频数据');
                        }
                        let inputData = e.inputBuffer.getChannelData(0);
                        
                        // 降采样到16kHz
                        let downsampledBuffer = downsampleBuffer(inputData, audioContext.sampleRate, 16000);
                        
                        // 转换为16bit PCM并累积
                        let int16Buffer = floatTo16BitPCM(downsampledBuffer);
                        audioBuffer.push(...int16Buffer);
                        
                        while (audioBuffer.length >= samplesPerBuffer) {
                            const chunk = new Int16Array(audioBuffer.splice(0, samplesPerBuffer));
                            if (websocket && websocket.readyState === WebSocket.OPEN) {
                                websocket.send(chunk.buffer);
                            } else {
                                console.warn('WebSocket未连接，无法发送音频数据');
                                break;
                            }
                        }
                    };

                    source.connect(processor);
                    processor.connect(audioContext.destination);
                    
                    console.log('使用ScriptProcessorNode方案');
                }

                isRecording = true;
                updateButtonStates();

            } catch (error) {
                console.error('开始录音失败:', error);
                alert('无法访问麦克风，请检查权限设置');
            }
        }

                }
                
                if (processor) {
                    processor.disconnect();
                    processor = null;
                }

                }

            }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 开始声纹录制
        async function startVoiceprintRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    } 
                });
                
                voiceprintAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                voiceprintAnalyser = voiceprintAudioContext.createAnalyser();
                voiceprintAnalyser.fftSize = 256;
                
                const source = voiceprintAudioContext.createMediaStreamSource(stream);
                source.connect(voiceprintAnalyser);
                
                voiceprintDataArray = new Uint8Array(voiceprintAnalyser.frequencyBinCount);
                
                // 设置MediaRecorder
                voiceprintRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                voiceprintAudioChunks = [];
                voiceprintAudioBlob = null;
                
                voiceprintRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        voiceprintAudioChunks.push(event.data);
                    }
                };
                
                voiceprintRecorder.onstop = () => {
                    voiceprintAudioBlob = new Blob(voiceprintAudioChunks, { type: 'audio/webm' });
                    console.log('录音完成，音频大小:', voiceprintAudioBlob.size, 'bytes');
                };
                
                // 开始录制
                voiceprintRecorder.start(100); // 每100ms收集一次数据
                voiceprintRecordingStartTime = Date.now();
                
                // 更新UI状态
                updateVoiceprintButtons(true);
                
                // 启动计时器
                voiceprintRecordingTimer = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - voiceprintRecordingStartTime) / 1000);
                    
                    // 自动停止录制（最长10秒）
                    if (elapsed >= 10) {
                        stopVoiceprintRecording();
                    }
                }, 1000);
                
                // 启动音频可视化
                startVisualizer();
                
            } catch (error) {
                console.error('开始录制失败:', error);
                alert('无法访问麦克风，请检查权限设置');
            }
        }

        // 停止声纹录制
        function stopVoiceprintRecording() {
            if (voiceprintRecorder && voiceprintRecorder.state === 'recording') {
                voiceprintRecorder.stop();
                
                // 停止所有音轨
                if (voiceprintRecorder.stream) {
                    voiceprintRecorder.stream.getTracks().forEach(track => track.stop());
                }
                
                if (voiceprintAudioContext) {
                    voiceprintAudioContext.close();
                    voiceprintAudioContext = null;
                }
                
                if (voiceprintRecordingTimer) {
                    clearInterval(voiceprintRecordingTimer);
                    voiceprintRecordingTimer = null;
                }
                
                if (voiceprintAnimationId) {
                    cancelAnimationFrame(voiceprintAnimationId);
                    voiceprintAnimationId = null;
                }
                
                console.log('录音已停止，开始自动上传');
                
                // 自动上传声纹录音
                setTimeout(() => {
                    uploadVoiceprintRecording();
                }, 500); // 延迟500ms确保录音完全停止
            }
        }

        // 上传声纹录音
        function uploadVoiceprintRecording() {
            updateVoiceprintButtons(false);
            if (!voiceprintAudioBlob) {
                alert('请先录制声纹音频');
                return;
            }
            
            // 检查音频大小是否合适
            if (voiceprintAudioBlob.size < 1000) {
                alert('录音太短，请录制至少3-5秒的音频');
                return;
            }
            
           
            
            // 创建FormData对象
            const formData = new FormData();
            formData.append('voiceprint', voiceprintAudioBlob, 'voiceprint.webm');
            formData.append('client_id', 'current_voiceprint'); // 使用固定client_id
            
            // 发送到服务器
            fetch('/api/voiceprint/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    loadVoiceprintFiles();
                    if (data.embeddingExtracted) {
                        alert('声纹录制成功！系统将仅允许你的声音进行对话。');
                    } else if (!data.modelAvailable) {
                        alert('声纹模型未就绪。请安装 modelscope: pip install modelscope');
                    } else {
                        alert('声纹嵌入提取失败: ' + (data.diagnostic || data.message));
                    }
                } else {
                    throw new Error(data.message || '服务器返回失败');
                }
            })
            .catch(error => {
                console.error('上传失败:', error);
                updateVoiceprintButtons(false); // 重新启用录制按钮
                alert('声纹上传失败: ' + error.message);
            });
        }

        // 音频可视化
        function startVisualizer() {
            const canvas = document.getElementById('visualizerCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            function draw() {
                if (!voiceprintAnalyser) return;
                
                voiceprintAnalyser.getByteFrequencyData(voiceprintDataArray);
                
                ctx.clearRect(0, 0, width, height);
                
                const barWidth = (width / voiceprintDataArray.length) * 2.5;
                let x = 0;
                
                for (let i = 0; i < voiceprintDataArray.length; i++) {
                    const barHeight = voiceprintDataArray[i] / 255 * height;
                    
                    const gradient = ctx.createLinearGradient(0, height - barHeight, 0, height);
                    gradient.addColorStop(0, '#6366F1');
                    gradient.addColorStop(1, '#8B5CF6');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, height - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 1;
                }
                
                voiceprintAnimationId = requestAnimationFrame(draw);
            }
            
            draw();
        }

        // Live2D模型管理相关变量
        let currentLive2DModel = null;

        let currentModelName = null;
        let allModelsConfig = {}; // 所有模型的配置缓存

        /** resize 监听器多次叠加会因 PIXI resizeTo + 手动居中反复抢画布尺寸导致闪屏；只绑定一次并用 rAF 合并 */
        let live2dResizeRaf = null;
        let live2dResizeHandlingInstalled = false;
        /** 面板与模型尺寸未变时跳过重复 scale/位移，减轻 WebGL 不必要的矩阵抖动 */
        let _live2dCenterFitCacheKey = '';

        function centerInsideLive2dModel() {
            if (!live2dModel || typeof app === 'undefined' || !app) return;
            const live2dPanel = document.querySelector('.live2d-panel');
            if (!live2dPanel) return;
            const panelWidth = live2dPanel.clientWidth;
            const panelHeight = live2dPanel.clientHeight;
            if (panelWidth < 8 || panelHeight < 8) return;

            const modelWidth = live2dModel.internalModel?.width || live2dModel.width;
            const modelHeight = live2dModel.internalModel?.height || live2dModel.height;
            if (!modelWidth || !modelHeight) return;

            const scaleX = panelWidth / modelWidth;
            const scaleY = panelHeight / modelHeight;
            const scale = Math.min(scaleX, scaleY);
            const fitKey = `${panelWidth}x${panelHeight}x${modelWidth}x${modelHeight}x${scale.toFixed(5)}`;
            if (fitKey === _live2dCenterFitCacheKey) return;
            _live2dCenterFitCacheKey = fitKey;

            live2dModel.scale.set(scale);

            const scaledWidth = modelWidth * scale;
            const scaledHeight = modelHeight * scale;
            live2dModel.x = Math.round((panelWidth - scaledWidth) / 2);
            live2dModel.y = Math.round((panelHeight - scaledHeight) / 2);
        }

        function scheduleCenterInsideLive2dModel() {
            if (live2dResizeRaf != null) cancelAnimationFrame(live2dResizeRaf);
            live2dResizeRaf = requestAnimationFrame(() => {
                live2dResizeRaf = requestAnimationFrame(() => {
                    live2dResizeRaf = null;
                    centerInsideLive2dModel();
                });
            });
        }

        function ensureLive2dResizeHandlingOnce() {
            if (live2dResizeHandlingInstalled) return;
            live2dResizeHandlingInstalled = true;
            window.addEventListener('resize', scheduleCenterInsideLive2dModel, { passive: true });
            try {
                const panel = document.querySelector('.live2d-panel');
                if (panel && typeof ResizeObserver !== 'undefined') {
                    const ro = new ResizeObserver(() => scheduleCenterInsideLive2dModel());
                    ro.observe(panel);
                }
            } catch (e) { /* 忽略 */ }
        }
