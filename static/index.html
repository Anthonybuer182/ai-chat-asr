            modal.style.display = 'none';
        }
        async function initLive2DModel() {
            try {
                const res = await fetch('/api/settings/get');
                const result = await res.json();
                currentLive2DModel = null;
                if (result.success && result.data.CURRENT_LIVE2D_MODEL) {
                    try {
                        const parsed = JSON.parse(result.data.CURRENT_LIVE2D_MODEL);
                        if (parsed && parsed.filePath) {
                            currentLive2DModel = parsed;
                        }
                    } catch (e) {
                        console.warn('解析后端模型数据失败:', e);
                    }
                }
                if (!currentLive2DModel || !currentLive2DModel.filePath) {
                    const lr = await fetch('/api/live2d/models');
                    const lrj = await lr.json();
                    if (lrj.success && lrj.models && lrj.models.length > 0) {
                        currentLive2DModel = lrj.models[0];
                        live2dModels = lrj.models;
                        fetch('/api/settings/change', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                CURRENT_LIVE2D_MODEL: JSON.stringify(currentLive2DModel)
                            })
                        }).catch((err) => console.error('保存默认 Live2D 模型失败:', err));
                    }
                }
                await loadLive2DModel(currentLive2DModel);
            } catch (err) {
                console.warn('获取后端配置失败:', err);
            }
        }
        // 加载实际的Live2D模型（使用pixi-live2d-display）
        async function loadLive2DModel(currentLive2DModel) {
            try {
                if (!currentLive2DModel || !currentLive2DModel.filePath) {
                    console.warn('[Live2D] 未配置模型或缺少 filePath，跳过加载');
                    return;
                }
                // filePath：相对 live2d_models 目录（例如 Epsilon/runtime/Epsilon.model3.json），挂载在 /live2d/models/
                let relPath = (currentLive2DModel.filePath || '').replace(/\\/g, '/');
                relPath = relPath.replace(/^\/+/, '');
                const legacyStrip = /^live2d_models\//;
                if (legacyStrip.test(relPath))
                    relPath = relPath.replace(legacyStrip, '');

                const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
                const host = window.location.host;
                const segs = relPath.split('/').filter(Boolean).map((s) => encodeURIComponent(s));
                const modelUrl = `${protocol}//${host}/live2d/models/${segs.join('/')}`;


                if (live2dModel) {
                    app.stage.removeChild(live2dModel);
                    live2dModel.destroy();
                }
                resetMouthParameterCache();
                runtimeMotionGroupNames = [];
                _live2dCenterFitCacheKey = '';

                await Promise.all([
                    fetchMotionGroupsFromModel3Url(modelUrl),
                    live2d.Live2DModel.from(modelUrl).then((m) => {
                        live2dModel = m;
                    }),
                ]);

                harvestMotionGroupsFromInternalModel();
                // 将模型添加到舞台
                app.stage.addChild(live2dModel);
                try {
                    live2dModel.roundPixels = true;
                } catch (e) { /* 部分运行时无该字段 */ }

                ensureLive2dResizeHandlingOnce();
                scheduleCenterInsideLive2dModel();

                // 为Cubism 4.0模型添加点击交互
                live2dModel.on("hit", (hitAreas) => {
                    if (hitAreas.includes("Body")) {
                        live2dModel.motion("Tap");  // 点击身体播放对应动作
                    }
                    if (hitAreas.includes("Head")) {
                        live2dModel.expression();  // 点击头部切换表情
                    }
                });
                
                if (LIVE2D_DEBUG) console.log('Live2D模型加载完成！');
                
                currentModelName = (currentLive2DModel.name || '').trim();
                await loadModelConfig(currentModelName);
            } catch (error) {
                console.error('Live2D模型加载失败:', error);
            }
        }
        
        async function loadModelConfig(modelName) {
            let nameKey = (modelName || '').trim();
            if (!nameKey) {
                if (currentLive2DModel && currentLive2DModel.name) {
                    const n = String(currentLive2DModel.name).trim();
                    if (n) return loadModelConfig(n);
                }
                currentModelConfig = null;
                return;
            }
            const keysInDict = Object.keys(allModelsConfig || {});
            const caseHit = keysInDict.find((k) => k.toLowerCase() === nameKey.toLowerCase());
            const effectiveKey = caseHit || nameKey;

            if (allModelsConfig[effectiveKey]) {
                currentModelConfig = allModelsConfig[effectiveKey];
                currentModelName = effectiveKey;
                if (LIVE2D_DEBUG) console.log(`使用缓存的模型 ${effectiveKey} 配置`);
                return;
            }

            try {
                const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
                const host = window.location.host;
                const response = await fetch(`${protocol}//${host}/api/live2d/model-config/${encodeURIComponent(effectiveKey)}`);
                const result = await response.json();

                if (result.success) {
                    currentModelConfig = result.config;
                    allModelsConfig[effectiveKey] = result.config;
                    currentModelName = effectiveKey;
                    if (LIVE2D_DEBUG) console.log(`模型 ${effectiveKey} 配置加载成功`);
                } else {
                    console.warn(`模型 ${effectiveKey} 配置加载失败: ${result.message}`);
                    currentModelConfig = null;
                }
            } catch (error) {
                console.error('加载模型配置失败:', error);
                currentModelConfig = null;
            }
        }
        
        // 页面初始化时加载所有模型配置
        async function loadAllModelsConfig() {
            try {
                const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
                const host = window.location.host;
                const response = await fetch(`${protocol}//${host}/api/live2d/all-config`);
                const result = await response.json();
                
                if (result.success) {
                    allModelsConfig = result.models || {};
                    if (LIVE2D_DEBUG) console.log('所有模型配置加载成功:', Object.keys(allModelsConfig));
                } else {
                    console.warn(`加载所有模型配置失败: ${result.message}`);
                }
            } catch (error) {
                console.error('加载所有模型配置失败:', error);
            }
        }
        
        function getAnimationForEmotion(emotion) {
            if (!emotion || isReservedLive2dConfigKey(String(emotion))) {
                return null;
            }
            if (!currentModelConfig) {
                if (LIVE2D_DEBUG) {
                    console.warn(`[WARN] currentModelConfig is null, emotion ${emotion} not found`);
                    console.warn(`[DEBUG] allModelsConfig keys:`, Object.keys(allModelsConfig));
                    console.warn(`[DEBUG] currentModelName:`, currentModelName);
                }
                return null;
            }

            let config = currentModelConfig[emotion] || null;
            if (!config) {
                const canon = canonicalLive2dEmotionKey(currentModelConfig, emotion);
                if (canon) config = currentModelConfig[canon];
            }
            if (config != null && !isLive2dEmotionEntryLike(config)) config = null;
            if (LIVE2D_DEBUG) console.log(`[DEBUG] getAnimationForEmotion(${emotion}):`, config);
            return config;
        }
        // 加载Live2D模型列表
        async function loadLive2DModels() {
            try {
                const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
                const host = window.location.host;
                const response = await fetch(`${protocol}//${host}/api/live2d/models`);
                const result = await response.json();
                
                if (result.success) {
                    live2dModels = result.models;
                    
                    const settingsRes = await fetch('/api/settings/get');
                    const settingsData = await settingsRes.json();
                    
                    if (settingsData.success && settingsData.data.CURRENT_LIVE2D_MODEL) {
                        try {
                            currentLive2DModel = JSON.parse(settingsData.data.CURRENT_LIVE2D_MODEL);
                        } catch (e) {
                            console.warn('解析后端模型数据失败:', e);
                        }
                    }
                    
                    if (currentLive2DModel && currentLive2DModel.name) {
                        await loadModelConfig(currentLive2DModel.name);
                    }
                    
                    renderModelList(live2dModels, currentLive2DModel);
                } else {
                    renderModelList(null, null, result.message);
                }
            } catch (error) {
                console.error('加载Live2D模型失败:', error);
                renderModelList(null, null, '网络连接错误');
            }
        }

        // 选择Live2D模型
        function selectLive2DModel(modelName) {
            if (LIVE2D_DEBUG) console.log("选择了模型名称:", modelName);
            const model = live2dModels.find(m => m.name === modelName);
            if (model) {
                currentLive2DModel = model;
                
                fetch('/api/settings/change', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        CURRENT_LIVE2D_MODEL: JSON.stringify(currentLive2DModel)
                    })
                }).catch(err => console.error('保存模型配置失败:', err));
                
                renderModelList(live2dModels, currentLive2DModel);
                
                loadLive2DModel(currentLive2DModel);
                
                currentModelName = modelName;
                loadModelConfig(modelName);

                closeLive2DModelModal();
            }
        }

        // 渲染模型列表到指定元素
        function renderModelList(models, currentLive2DModel, errorMessage = null) {

            const modelListElement = document.getElementById('live2dModelList');
            
            if (errorMessage) {
                // 错误状态显示
                modelListElement.innerHTML = `
                    <div class="no-models">
                        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 10px; color: #dc3545;"></i>
                        <div>加载模型失败</div>
                        <div style="font-size: 12px; margin-top: 5px;">${errorMessage}</div>
                    </div>
                `;
                return;
            }
            
            if (!models || models.length === 0) {
                // 空模型列表显示
                modelListElement.innerHTML = `
                    <div class="no-models">
                        <i class="fas fa-cube" style="font-size: 32px; margin-bottom: 10px; color: #6c757d;"></i>
                        <div>暂无模型</div>
                        <div style="font-size: 12px; margin-top: 5px;">请在后端live2d_models目录中添加模型文件</div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            // 重新排序模型列表：将选择的模型放在最前面
            const sortedModels = [...models];
            if (currentLive2DModel) {
                const currentIndex = models.findIndex(m => m.name === currentLive2DModel.name);
                if (currentIndex >= 0 && currentIndex < sortedModels.length) {
                    const selectedModel = sortedModels.splice(currentIndex, 1)[0];
                    sortedModels.unshift(selectedModel);
                }
            }
            
            sortedModels.forEach((model, displayIndex) => {
                const isSelected = model.name === currentLive2DModel?.name;
                
                html += `
                    <div class="model-item ${isSelected ? 'selected' : ''}" onclick="selectLive2DModel('${model.name}')">
                        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; cursor: pointer;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <i class="fas fa-cube" style="color: #667eea;"></i>
                                <span class="model-name">${model.name}</span>
                                ${displayIndex === 0 && currentLive2DModel ? '<span style="font-size: 10px; color: #28a745; margin-left: 5px;">(上次选择)</span>' : ''}
                            </div>
                            <button class="delete-model-btn" onclick="deleteLive2DModel('${model.name}', event)" title="删除模型">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            modelListElement.innerHTML = html;
        }

        // 删除Live2D模型
        async function deleteLive2DModel(modelName, event) {
            // 阻止事件冒泡，避免触发选择模型
            event.stopPropagation();
            
            if (!confirm(`确定要删除模型 "${modelName}" 吗？此操作不可撤销。`)) {
                return;
            }

            if (currentLive2DModel && currentLive2DModel.name === modelName) {

                return;
            }
            
            try {
                const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
                const host = window.location.host;
                const response = await fetch(`${protocol}//${host}/api/live2d/models/${encodeURIComponent(modelName)}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 重新加载模型列表
                    await loadLive2DModels();
                } 
            } catch (error) {
                console.error('删除模型失败:', error);
            }
        }
        
        // 使模型可拖拽
        function makeDraggable(model) {
            model.on('pointerdown', (e) => {
                model.dragging = true;
                model._pointerX = e.data.global.x - model.x;
                model._pointerY = e.data.global.y - model.y;
            });
            
            model.on('pointermove', (e) => {
                if (model.dragging) {
                    model.position.x = e.data.global.x - model._pointerX;
                    model.position.y = e.data.global.y - model._pointerY;
                }
            });
            
            model.on('pointerupoutside', () => {
                model.dragging = false;
            });
            
            model.on('pointerup', () => {
                model.dragging = false;
            });
        }
        
        // 触发随机动作
        function triggerRandomMotion(model, motionType = 'random') {
            if (model.motionManager) {
                const motions = model.motionManager.groups;
                const motionNames = Object.keys(motions);
                
                if (motionNames.length > 0) {
                    let availableMotions = motionNames;
                    
                    // 根据类型筛选动作
                    if (motionType === 'body') {
                        availableMotions = motionNames.filter(name => 
                            name.toLowerCase().includes('body') || 
                            name.toLowerCase().includes('tap') ||
                            name.toLowerCase().includes('touch')
                        );
                    }
                    
                    // 如果没有特定类型的动作，使用所有动作
                    if (availableMotions.length === 0) {
                        availableMotions = motionNames;
                    }
                    
                    const randomMotion = availableMotions[Math.floor(Math.random() * availableMotions.length)];
                    if (LIVE2D_DEBUG) console.log('触发动作:', randomMotion);
                    model.motion(randomMotion);
                }
            }
        }
        
        // 触发随机表情
        function triggerRandomExpression(model) {
            if (model.expressionManager) {
                const expressions = model.expressionManager.expressions;
                const expressionNames = Object.keys(expressions);
                
                if (expressionNames.length > 0) {
                    const randomExpression = expressionNames[Math.floor(Math.random() * expressionNames.length)];
                    if (LIVE2D_DEBUG) console.log('触发表情:', randomExpression);
                    model.expression(randomExpression);
                }
            }
        }

        // 上传Live2D模型压缩包
        async function uploadLive2DModel(file) {
            if (!file) {
                return;
            }
            
            // 检查文件格式
            const fileName = file.name.toLowerCase();
            if (!fileName.endsWith('.zip') && !fileName.endsWith('.rar') && !fileName.endsWith('.7z')) {
                addMessage('请上传.zip、.rar或.7z格式的压缩包', 'error');
                return;
            }

            // 显示上传状态
            const dropzone = document.getElementById('live2dUploadDropzone');
            if (dropzone) {
                dropzone.innerHTML = '<i class="fas fa-spinner fa-spin"></i><p>上传中...</p>';
                dropzone.style.cursor = 'not-allowed';
            }

            try {
                // 创建FormData对象
                const formData = new FormData();
                formData.append('zip_file', file);

                // 发送到后端API
                const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
                const host = window.location.host;
                const response = await fetch(`${protocol}//${host}/api/live2d/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {                    
                    // 刷新模型列表
                    await loadLive2DModels();
                }

            } catch (error) {
                console.error('上传Live2D模型失败:', error);
            }

            // 恢复上传区域状态
            if (dropzone) {
                dropzone.innerHTML = '<i class="fas fa-cloud-upload-alt"></i><p>点击或拖拽压缩包到此处上传</p><small>支持 .zip, .rar, .7z 格式的Live2D模型压缩包</small>';
                dropzone.style.cursor = 'pointer';
            }
        }


        // 页面卸载时清理资源
        window.addEventListener('beforeunload', function() {
            disconnectWebSocket();
        });
        // 初始化拖拽上传功能
        function initDragAndDrop() {
            const dropzone = document.getElementById('live2dUploadDropzone');
            const fileInput = document.getElementById('live2dModelFile');
            
            if (!dropzone || !fileInput) return;
            
            // 点击上传区域触发文件选择
            dropzone.addEventListener('click', function(event) {
                event.stopPropagation();
                event.preventDefault();
                fileInput.click();
            });
            
            // 拖拽事件
            dropzone.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.stopPropagation();
                dropzone.style.borderColor = '#2196f3';
                dropzone.style.backgroundColor = '#e3f2fd';
            });
            
            dropzone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                e.stopPropagation();
                dropzone.style.borderColor = '#dee2e6';
                dropzone.style.backgroundColor = '#f8f9fa';
            });
            
            dropzone.addEventListener('drop', function(e) {
                e.preventDefault();
                e.stopPropagation();
                dropzone.style.borderColor = '#dee2e6';
                dropzone.style.backgroundColor = '#f8f9fa';
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    // 直接上传文件，不通过文件选择器
                    uploadLive2DModel(files[0]);
                }
            });
            
            // 文件选择器变化事件 - 使用更可靠的方式
            fileInput.addEventListener('change', function(event) {
                event.stopPropagation();
                event.preventDefault();
                
                if (this.files.length > 0) {
                    // 直接上传文件
                    uploadLive2DModel(this.files[0]);
                    
                    // 清空文件选择器，允许重复选择同一文件
                    this.value = '';
                }
            });
        }
        // 页面加载完成后的初始化
        window.addEventListener('DOMContentLoaded', async function() {
            if (LIVE2D_DEBUG) {
                console.log('页面加载完成，开始初始化...');
                console.log('[DEBUG] 开始加载模型配置...');
            }
            
            // 先加载所有模型的配置
            await loadAllModelsConfig();
            if (LIVE2D_DEBUG) console.log('[DEBUG] allModelsConfig 加载完成:', Object.keys(allModelsConfig));
            
            // 初始化Live2D模型
            if (LIVE2D_DEBUG) console.log('[DEBUG] 开始初始化 Live2D 模型...');
            await initLive2DModel();
            
            // 初始化按钮状态
            updateButtonStates();
            
            if (LIVE2D_DEBUG) {
                console.log('初始化完成');
                console.log('[DEBUG] currentModelConfig:', currentModelConfig);
                console.log('[DEBUG] currentModelName:', currentModelName);
            }
        });
        // 页面加载时自动连接服务器
        window.addEventListener('load', function() {
            connectWebSocket();
            initDragAndDrop();
        });
    </script>
